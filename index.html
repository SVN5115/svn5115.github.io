<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비즈니스 플래너</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        :root { --main-bg: #f8f9fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--main-bg); margin: 0; }

        /* ── 로그인 ── */
        #login-screen { position: fixed; inset: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #login-screen.hidden { display: none; }
        .login-box { background: white; border-radius: 16px; padding: 40px 36px 32px; width: 340px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); display: flex; flex-direction: column; gap: 16px; }
        .login-logo { font-size: 28px; text-align: center; }
        .login-title { text-align: center; font-size: 18px; font-weight: bold; color: #1e293b; margin: 0; }
        .login-subtitle { text-align: center; font-size: 12px; color: #94a3b8; margin: -10px 0 0; }
        .login-field { display: flex; flex-direction: column; gap: 5px; }
        .login-field label { font-size: 12px; font-weight: bold; color: #475569; }
        .login-field input { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: 'Malgun Gothic', sans-serif; outline: none; }
        .login-field input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .login-btn { padding: 12px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; }
        .login-btn:hover { background: #4f46e5; }
        .login-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
        .login-error { font-size: 12px; color: #ef4444; text-align: center; min-height: 16px; }
        .login-notice { font-size: 11px; color: #94a3b8; text-align: center; line-height: 1.5; border-top: 1px solid #f1f5f9; padding-top: 12px; }

        /* ── 상단 바 ── */
        #top-bar { position: fixed; top: 0; left: 0; right: 0; height: 36px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: flex-end; padding: 0 16px; gap: 10px; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        #user-label { font-size: 12px; color: #475569; }
        #user-label span { font-weight: bold; color: #6366f1; }
        #logout-btn { padding: 4px 12px; background: none; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; cursor: pointer; color: #64748b; font-family: 'Malgun Gothic', sans-serif; }
        #logout-btn:hover { background: #f8fafc; }
        #sync-indicator { font-size: 11px; color: #94a3b8; }
        #sync-indicator.saving { color: #f59e0b; }
        #sync-indicator.saved  { color: #22c55e; }
        #sync-indicator.error  { color: #ef4444; }

        /* ── 로딩 ── */
        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9998; gap: 12px; }
        #loading-overlay.hidden { display: none; }
        .loading-spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 13px; color: #64748b; }

        /* ── 앱 ── */
        #app { display: none; padding-top: 36px; height: 100vh; box-sizing: border-box; }
        #app.visible { display: flex; align-items: center; justify-content: center; }
        .container { display: flex; width: 98%; max-width: 2400px; height: calc(96vh - 36px); gap: 15px; }
        #calendar-container { flex: 4; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; min-width: 0; }
        #calendar { flex: 1; }
        .side-panel { width: 230px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
        #routine-panel { display: flex; flex-direction: column; flex: 1; gap: 10px; min-height: 0; }
        #routine-panel.hidden { display: none; }

        /* ── 섹션 ── */
        .wp-section { flex: 1; background: white; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; padding: 11px 12px 8px 12px; box-sizing: border-box; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        #sec-routine { border-top: 3px solid #6366f1; }
        #sec-expense { border-top: 3px solid #10b981; }
        #sec-report  { border-top: 3px solid #f59e0b; }
        .wp-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-shrink: 0; }
        .wp-section-label { font-size: 12px; font-weight: bold; color: #334155; display: flex; align-items: center; gap: 4px; }
        #sec-routine .wp-section-label::before { content: '🔁'; }
        #sec-expense .wp-section-label::before { content: '💰'; }
        #sec-report  .wp-section-label::before { content: '📋'; }
        .wp-plus-btn { width: 22px; height: 22px; border-radius: 50%; border: none; font-size: 16px; line-height: 1; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; }
        #sec-routine .wp-plus-btn { background: #6366f1; } #sec-routine .wp-plus-btn:hover { background: #4f46e5; }
        #sec-expense .wp-plus-btn { background: #10b981; } #sec-expense .wp-plus-btn:hover { background: #059669; }
        #sec-report  .wp-plus-btn { background: #f59e0b; } #sec-report  .wp-plus-btn:hover { background: #d97706; }
        .wp-add-form { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px; padding: 9px 10px 8px; margin-bottom: 8px; flex-shrink: 0; display: none; flex-direction: column; gap: 6px; }
        .wp-add-form.visible { display: flex; }
        .wp-add-form label { font-size: 10px; color: #64748b; font-weight: bold; }
        .wp-add-form input, .wp-add-form textarea { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 11px; font-family: 'Malgun Gothic', sans-serif; outline: none; box-sizing: border-box; resize: none; }
        .wp-add-form textarea { height: 56px; line-height: 1.5; }
        #sec-routine .wp-add-form input:focus, #sec-routine .wp-add-form textarea:focus { border-color: #6366f1; }
        #sec-expense .wp-add-form input:focus, #sec-expense .wp-add-form textarea:focus { border-color: #10b981; }
        #sec-report  .wp-add-form input:focus, #sec-report  .wp-add-form textarea:focus { border-color: #f59e0b; }
        .wp-form-actions { display: flex; justify-content: flex-end; gap: 5px; }
        .wp-form-cancel { padding: 4px 10px; background: none; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; cursor: pointer; color: #64748b; font-family: 'Malgun Gothic', sans-serif; }
        .wp-form-save { padding: 4px 12px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; color: white; font-family: 'Malgun Gothic', sans-serif; }
        #sec-routine .wp-form-save { background: #6366f1; } #sec-routine .wp-form-save:hover { background: #4f46e5; }
        #sec-expense .wp-form-save { background: #10b981; } #sec-expense .wp-form-save:hover { background: #059669; }
        #sec-report  .wp-form-save { background: #f59e0b; } #sec-report  .wp-form-save:hover { background: #d97706; }
        .wp-groups { flex: 1; overflow-y: auto; min-height: 0; }
        .wp-groups::-webkit-scrollbar { width: 4px; }
        .wp-groups::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .wp-group { margin-bottom: 8px; }
        .wp-group-header { display: flex; align-items: center; gap: 4px; padding: 4px 6px; border-radius: 5px; margin-bottom: 3px; user-select: none; }
        #sec-routine .wp-group-header { background: #ede9fe; }
        #sec-expense .wp-group-header { background: #d1fae5; }
        #sec-report  .wp-group-header { background: #fef3c7; }
        .wp-group-toggle { font-size: 9px; color: #888; flex-shrink: 0; cursor: pointer; padding: 0 2px; }
        .wp-group-title { flex: 1; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        #sec-routine .wp-group-title { color: #4338ca; }
        #sec-expense .wp-group-title { color: #065f46; }
        #sec-report  .wp-group-title { color: #92400e; }
        .wp-group-edit-btn { color: #94a3b8; border: none; background: none; font-size: 11px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
        .wp-group-edit-btn:hover { color: #6366f1; }
        .wp-group-del-btn { color: #cbd5e1; border: none; background: none; font-size: 12px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
        .wp-group-del-btn:hover { color: #f87171; }
        .wp-edit-form { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 9px 7px; margin: 4px 0 6px 0; display: none; flex-direction: column; gap: 5px; }
        .wp-edit-form.visible { display: flex; }
        .wp-edit-form label { font-size: 10px; color: #64748b; font-weight: bold; }
        .wp-edit-form input, .wp-edit-form textarea { width: 100%; padding: 5px 7px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; font-family: 'Malgun Gothic', sans-serif; outline: none; box-sizing: border-box; resize: none; }
        .wp-edit-form textarea { height: 52px; line-height: 1.5; }
        .wp-edit-actions { display: flex; justify-content: flex-end; gap: 5px; }
        .wp-edit-cancel { padding: 3px 9px; background: none; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; cursor: pointer; color: #64748b; font-family: 'Malgun Gothic', sans-serif; }
        .wp-edit-save { padding: 3px 10px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; color: white; font-family: 'Malgun Gothic', sans-serif; }
        #sec-routine .wp-edit-save { background: #6366f1; }
        #sec-expense .wp-edit-save { background: #10b981; }
        #sec-report  .wp-edit-save { background: #f59e0b; }
        .wp-item-list { list-style: none; padding: 0; margin: 0 0 0 14px; }
        .wp-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; border-bottom: 1px solid #f8fafc; font-size: 11px; color: #374151; }
        .wp-item:last-child { border-bottom: none; }
        .wp-item input[type="checkbox"] { width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; margin-top: 2px; }
        #sec-routine .wp-item input[type="checkbox"] { accent-color: #6366f1; }
        #sec-expense .wp-item input[type="checkbox"] { accent-color: #10b981; }
        #sec-report  .wp-item input[type="checkbox"] { accent-color: #f59e0b; }
        .wp-item-text { flex: 1; word-break: break-all; line-height: 1.4; white-space: pre-wrap; }
        .wp-item-text.done { text-decoration: line-through; color: #9ca3af; }
        .wp-item-del { color: #ddd; cursor: pointer; border: none; background: none; font-size: 11px; padding: 0 1px; line-height: 1; flex-shrink: 0; }
        .wp-item-del:hover { color: #f87171; }
        .wp-empty { color: #c0c8d4; font-size: 11px; text-align: center; padding: 10px 0; }
        .todo-section { background: white; border: 1px solid #eee; border-radius: 12px; padding: 25px; box-sizing: border-box; flex: 1; display: flex; flex-direction: column; }
        .todo-section.hidden { display: none; }
        #selected-date-display { color: #007bff; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; flex-shrink: 0; }
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; flex-shrink: 0; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Malgun Gothic', sans-serif; }
        .input-group button { padding: 10px 15px; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .todo-list { list-style: none; padding: 0; overflow-y: auto; flex: 1; }
        .todo-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .delete-btn { color: #ff4d4f; cursor: pointer; border: none; background: none; }
        .fc .fc-daygrid-day-frame { cursor: pointer; overflow: hidden; position: relative; }
        .fc .fc-daygrid-day-top { display: flex !important; align-items: center !important; padding: 4px !important; flex-direction: row !important; position: relative; }
        .fc .fc-daygrid-day-number { font-weight: bold; text-decoration: none !important; padding: 0 !important; font-size: 14px; }
        .fc .fc-day-sat .fc-daygrid-day-number { color: #0000ff !important; }
        .fc .fc-day-sun .fc-daygrid-day-number { color: #ff0000 !important; }
        .fc .fc-daygrid-day-events { display: none !important; height: 0 !important; min-height: 0 !important; margin: 0 !important; padding: 0 !important; }
        .fc .fc-daygrid-day-bg { display: none !important; }
        .fc .fc-daygrid-day-bottom { display: none !important; height: 0 !important; margin: 0 !important; padding: 0 !important; }
        .fc .fc-daygrid-event-harness { display: none !important; }
        .cell-todos { padding: 0 2px; display: flex; flex-direction: column; gap: 2px; }
        .cell-todo-item:last-child { margin-bottom: 6px; }
        .cell-todo-item { font-size: 9px; border-radius: 2px; padding: 0 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 13px; height: 13px; box-sizing: border-box; }
        .cell-todo-c0 { background: #dbeafe; color: #1e40af; }
        .cell-todo-c1 { background: #e2e8f0; color: #374151; }
        .cell-todo-more { position: absolute; top: 3px; right: 3px; font-size: 8px; font-weight: bold; color: #fff; background: #999; border-radius: 2px; padding: 0 3px; line-height: 13px; pointer-events: none; z-index: 2; }
        .v-box { width: 16px; height: 16px; border: 1px solid #ccc; margin-right: 6px; display: flex; align-items: center; justify-content: center; background: #fff; pointer-events: none; flex-shrink: 0; }
        .v-box.is-checked { border-color: #000; background: #eee; }
        .day-v-checkmark-svg { display: none; width: 11px; height: 11px; fill: #000; }
        .v-box.is-checked .day-v-checkmark-svg { display: block; }
        .holiday-label { position: absolute; top: 4px; right: 6px; font-size: 10px; color: #ff0000; font-weight: bold; }
        .fc-daygrid-day.selected-day { background-color: #f0f7ff !important; }
    </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">📅</div>
        <h2 class="login-title">비즈니스 플래너</h2>
        <p class="login-subtitle">ID와 PW로 어디서든 동일한 데이터 저장</p>
        <div class="login-field">
            <label>아이디 (ID)</label>
            <input type="text" id="login-id" placeholder="사용할 아이디 입력" autocomplete="username">
        </div>
        <div class="login-field">
            <label>비밀번호 (PW)</label>
            <input type="password" id="login-pw" placeholder="사용할 비밀번호 입력" autocomplete="current-password">
        </div>
        <div class="login-error" id="login-error"></div>
        <button class="login-btn" id="login-btn">로그인 / 회원가입</button>
        <p class="login-notice">
            처음 입력한 ID+PW로 자동 계정 생성됩니다.<br>
            같은 ID+PW를 다른 기기에서 입력하면 동일한 데이터를 불러옵니다.
        </p>
    </div>
</div>

<!-- 로딩 -->
<div id="loading-overlay" class="hidden">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">데이터를 불러오는 중...</div>
</div>

<!-- 상단 바 -->
<div id="top-bar" style="display:none;">
    <div id="sync-indicator">●</div>
    <div id="user-label">로그인: <span id="user-id-label"></span></div>
    <button id="logout-btn">로그아웃</button>
</div>

<!-- 앱 -->
<div id="app">
    <div class="container">
        <div id="calendar-container"><div id="calendar"></div></div>

        <div id="routine-panel" class="side-panel">
            <div class="wp-section" id="sec-routine">
                <div class="wp-section-header">
                    <div class="wp-section-label">루틴 업무</div>
                    <button class="wp-plus-btn" id="plus-routine">+</button>
                </div>
                <div class="wp-add-form" id="form-routine">
                    <div><label>대제목</label><input id="ftitle-routine" placeholder="대제목을 입력하세요"></div>
                    <div><label>내용</label><textarea id="fbody-routine" placeholder="내용을 입력하세요"></textarea></div>
                    <div class="wp-form-actions">
                        <button class="wp-form-cancel" id="fcancel-routine">취소</button>
                        <button class="wp-form-save" id="fsave-routine">저장</button>
                    </div>
                </div>
                <div class="wp-groups" id="groups-routine"></div>
            </div>
            <div class="wp-section" id="sec-expense">
                <div class="wp-section-header">
                    <div class="wp-section-label">지출 업무</div>
                    <button class="wp-plus-btn" id="plus-expense">+</button>
                </div>
                <div class="wp-add-form" id="form-expense">
                    <div><label>대제목</label><input id="ftitle-expense" placeholder="대제목을 입력하세요"></div>
                    <div><label>내용</label><textarea id="fbody-expense" placeholder="내용을 입력하세요"></textarea></div>
                    <div class="wp-form-actions">
                        <button class="wp-form-cancel" id="fcancel-expense">취소</button>
                        <button class="wp-form-save" id="fsave-expense">저장</button>
                    </div>
                </div>
                <div class="wp-groups" id="groups-expense"></div>
            </div>
            <div class="wp-section" id="sec-report">
                <div class="wp-section-header">
                    <div class="wp-section-label">보고 업무</div>
                    <button class="wp-plus-btn" id="plus-report">+</button>
                </div>
                <div class="wp-add-form" id="form-report">
                    <div><label>대제목</label><input id="ftitle-report" placeholder="대제목을 입력하세요"></div>
                    <div><label>내용</label><textarea id="fbody-report" placeholder="내용을 입력하세요"></textarea></div>
                    <div class="wp-form-actions">
                        <button class="wp-form-cancel" id="fcancel-report">취소</button>
                        <button class="wp-form-save" id="fsave-report">저장</button>
                    </div>
                </div>
                <div class="wp-groups" id="groups-report"></div>
            </div>
        </div>

        <div class="todo-section side-panel hidden" id="todo-section">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-shrink:0;">
                <h3 style="margin:0;">일정 상세</h3>
                <button id="close-todo-btn" style="background:none;border:none;font-size:18px;cursor:pointer;color:#888;">&#x2715;</button>
            </div>
            <div id="selected-date-display">날짜를 선택하세요</div>
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="새 일정 입력...">
                <button id="add-btn">추가</button>
            </div>
            <ul id="todo-list" class="todo-list"></ul>
        </div>
    </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   ★ Supabase 설정 — 아래 두 줄만 교체하세요
   1) supabase.com → 프로젝트 생성
   2) Settings → API 에서 URL과 anon key 복사
   3) Table Editor → 새 테이블 "planner_data" 생성:
      - user_key : text  (Primary Key)
      - data     : jsonb
      - created_at 자동생성 그대로 두기
   4) Authentication → Policies → planner_data 테이블에
      "Enable read/write for all" 정책 추가 (anon 허용)
══════════════════════════════════════════════════ */
var SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
var SUPABASE_KEY = 'YOUR_ANON_PUBLIC_KEY';
var TABLE = 'planner_data';

/* ── Supabase REST 헬퍼 ── */
async function sbGet(userKey) {
    try {
        var r = await fetch(
            SUPABASE_URL + '/rest/v1/' + TABLE + '?user_key=eq.' + encodeURIComponent(userKey) + '&select=data',
            { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        if (!r.ok) return null;
        var rows = await r.json();
        return rows.length ? rows[0].data : null;
    } catch(e) { return null; }
}

async function sbUpsert(userKey, data) {
    try {
        var r = await fetch(
            SUPABASE_URL + '/rest/v1/' + TABLE,
            {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_KEY,
                    'Content-Type': 'application/json',
                    'Prefer': 'resolution=merge-duplicates'
                },
                body: JSON.stringify({ user_key: userKey, data: data })
            }
        );
        return r.ok || r.status === 201;
    } catch(e) { return false; }
}

/* ── 간단한 문자열 해시 (ID+PW → user_key) ── */
function hashStr(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
    return 'u_' + Math.abs(h).toString(36);
}

/* ── 저장 ── */
function setSyncStatus(cls, txt) { var el=document.getElementById('sync-indicator'); el.className=cls; el.textContent=txt; }
function saveAll() {
    clearTimeout(saveTimer);
    setSyncStatus('saving','● 저장 중...');
    var snap = { activeDate:activeDate, todos:todos, wpData:wpData };
    saveTimer = setTimeout(async function() {
        var ok = await sbUpsert(currentUserKey, snap);
        setSyncStatus(ok?'saved':'error', ok?'● 저장됨':'● 저장 실패');
    }, 800);
}

/* ══════════════════════════════════════════════════
   섹션 렌더
══════════════════════════════════════════════════ */
function renderSection(key) {
    var container = document.getElementById('groups-'+key);
    container.innerHTML = '';
    var groups = wpData[key]||[];
    if (!groups.length) {
        var e=document.createElement('div'); e.className='wp-empty'; e.textContent='+ 버튼으로 항목을 추가하세요'; container.appendChild(e); return;
    }
    groups.forEach(function(g, gi) {
        var gDiv=document.createElement('div'); gDiv.className='wp-group';
        var hdr=document.createElement('div'); hdr.className='wp-group-header';
        var tog=document.createElement('span'); tog.className='wp-group-toggle'; tog.textContent=g.open!==false?'▼':'▶';
        var ttl=document.createElement('span'); ttl.className='wp-group-title'; ttl.textContent=g.title;
        var editBtn=document.createElement('button'); editBtn.className='wp-group-edit-btn'; editBtn.innerHTML='✏️';
        var delBtn=document.createElement('button');  delBtn.className='wp-group-del-btn';  delBtn.innerHTML='✕';
        (function(k,idx){
            tog.onclick=function(){ toggleGroup(k,idx); };
            ttl.onclick=function(){ toggleGroup(k,idx); };
            delBtn.onclick=function(e){ e.stopPropagation(); wpData[k].splice(idx,1); saveAll(); renderSection(k); };
            editBtn.onclick=function(e){
                e.stopPropagation();
                var ef=gDiv.querySelector('.wp-edit-form'), wasOpen=ef.classList.contains('visible');
                container.querySelectorAll('.wp-edit-form.visible').forEach(function(f){ f.classList.remove('visible'); });
                if(!wasOpen){ ef.querySelector('.wp-ei-title').value=wpData[k][idx].title; ef.querySelector('.wp-ei-body').value=wpData[k][idx].body||''; ef.classList.add('visible'); ef.querySelector('.wp-ei-title').focus(); }
            };
        })(key,gi);
        hdr.appendChild(tog); hdr.appendChild(ttl); hdr.appendChild(editBtn); hdr.appendChild(delBtn);
        gDiv.appendChild(hdr);

        var ef=document.createElement('div'); ef.className='wp-edit-form';
        ef.innerHTML='<div><label>대제목</label><input class="wp-ei-title"></div><div><label>내용</label><textarea class="wp-ei-body"></textarea></div><div class="wp-edit-actions"><button class="wp-edit-cancel">취소</button><button class="wp-edit-save">저장</button></div>';
        (function(k,idx){
            ef.querySelector('.wp-edit-cancel').onclick=function(){ ef.classList.remove('visible'); };
            ef.querySelector('.wp-edit-save').onclick=function(){
                var nt=ef.querySelector('.wp-ei-title').value.trim(), nb=ef.querySelector('.wp-ei-body').value.trim();
                if(!nt){ ef.querySelector('.wp-ei-title').focus(); return; }
                wpData[k][idx].title=nt; wpData[k][idx].body=nb; wpData[k][idx].checked={};
                saveAll(); renderSection(k);
            };
            ef.querySelector('.wp-ei-body').addEventListener('keydown',function(ev){ if(ev.key==='Enter'&&ev.ctrlKey) ef.querySelector('.wp-edit-save').click(); });
        })(key,gi);
        gDiv.appendChild(ef);

        if(g.open!==false){
            var ul=document.createElement('ul'); ul.className='wp-item-list';
            var lines=(g.body||'').split('\n').filter(function(l){ return l.trim(); });
            lines.forEach(function(line,li){
                var item=document.createElement('li'); item.className='wp-item';
                var cb=document.createElement('input'); cb.type='checkbox'; cb.checked=!!(g.checked&&g.checked[li]);
                var span=document.createElement('span'); span.className='wp-item-text'+(cb.checked?' done':''); span.textContent=line;
                var idel=document.createElement('button'); idel.className='wp-item-del'; idel.innerHTML='✕';
                (function(k,idx,cli){
                    cb.onchange=function(){ if(!wpData[k][idx].checked) wpData[k][idx].checked={}; wpData[k][idx].checked[cli]=cb.checked; saveAll(); renderSection(k); };
                    idel.onclick=function(){
                        var ls=(wpData[k][idx].body||'').split('\n').filter(function(l){ return l.trim(); });
                        ls.splice(cli,1); wpData[k][idx].body=ls.join('\n');
                        var nc={}; ls.forEach(function(_,ni){ var oi=ni<cli?ni:ni+1; if(g.checked&&g.checked[oi]) nc[ni]=true; });
                        wpData[k][idx].checked=nc; saveAll(); renderSection(k);
                    };
                })(key,gi,li);
                item.appendChild(cb); item.appendChild(span); item.appendChild(idel); ul.appendChild(item);
            });
            gDiv.appendChild(ul);
        }
        container.appendChild(gDiv);
    });
}
function toggleGroup(key,gi){ wpData[key][gi].open=(wpData[key][gi].open===false)?true:false; saveAll(); renderSection(key); }
function openForm(key){ ['routine','expense','report'].forEach(function(k){ document.getElementById('form-'+k).classList.remove('visible'); document.getElementById('ftitle-'+k).value=''; document.getElementById('fbody-'+k).value=''; }); document.getElementById('form-'+key).classList.add('visible'); document.getElementById('ftitle-'+key).focus(); }
function closeForm(key){ document.getElementById('form-'+key).classList.remove('visible'); document.getElementById('ftitle-'+key).value=''; document.getElementById('fbody-'+key).value=''; }
function saveForm(key){
    var title=document.getElementById('ftitle-'+key).value.trim(), body=document.getElementById('fbody-'+key).value.trim();
    if(!title){ document.getElementById('ftitle-'+key).focus(); return; }
    wpData[key].push({title:title,body:body,open:true,checked:{}}); saveAll(); renderSection(key); closeForm(key);
}
function showRoutine(){ document.getElementById('routine-panel').classList.remove('hidden'); document.getElementById('todo-section').classList.add('hidden'); }
function showTodo(){    document.getElementById('routine-panel').classList.add('hidden');    document.getElementById('todo-section').classList.remove('hidden'); }

function applyCellSquare(){
    var calEl=document.getElementById('calendar'); if(!calEl) return;
    var tb=calEl.querySelector('.fc-header-toolbar'), ch=calEl.querySelector('.fc-col-header');
    var rows=calEl.querySelectorAll('.fc-daygrid-body tr'), rc=rows.length||6;
    var h=Math.floor((calEl.offsetHeight-(tb?tb.offsetHeight:0)-(ch?ch.offsetHeight:0)-2)/rc);
    document.querySelectorAll('.fc-daygrid-day-frame').forEach(function(f){ f.style.setProperty('height',h+'px','important'); });
}
function applyHolidayColors(){
    Object.keys(holidays).forEach(function(d){
        var cell=document.querySelector('.fc-daygrid-day[data-date="'+d+'"]'); if(!cell) return;
        var n=cell.querySelector('.fc-daygrid-day-number');
        if(n) n.setAttribute('style','color:#ff0000!important;font-weight:bold;text-decoration:none;padding:0;');
    });
}
function renderCellTodos(dateStr){
    var cell=document.querySelector('.fc-daygrid-day[data-date="'+dateStr+'"]'); if(!cell) return;
    ['cell-todos','cell-todo-more'].forEach(function(cls){ var el=cell.querySelector('.'+cls); if(el) el.parentNode.removeChild(el); });
    var items=todos[dateStr]||[]; if(!items.length) return;
    var frame=cell.querySelector('.fc-daygrid-day-frame'), wrap=document.createElement('div'); wrap.className='cell-todos';
    items.slice(0,MAX_VISIBLE).forEach(function(t,idx){ var tag=document.createElement('div'); tag.className='cell-todo-item cell-todo-c'+(idx%2); tag.title=t.text; tag.textContent=t.text; wrap.appendChild(tag); });
    frame.appendChild(wrap);
    var extra=items.length-MAX_VISIBLE;
    if(extra>0){ var more=document.createElement('div'); more.className='cell-todo-more'; more.textContent='+'+extra; frame.appendChild(more); }
}
function renderAllCellTodos(){ Object.keys(todos).forEach(renderCellTodos); }
function refreshCalendar(){ setTimeout(function(){ calendar.updateSize(); setTimeout(function(){ applyCellSquare(); renderAllCellTodos(); },100); },50); }

/* ── 앱 시작 ── */
function initApp(data) {
    activeDate=data.activeDate||""; todos=data.todos||{}; wpData=data.wpData||{routine:[],expense:[],report:[]};
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('top-bar').style.display='flex';
    document.getElementById('app').classList.add('visible');
    document.getElementById('user-id-label').textContent=currentUserId;

    if(!calendar){
        calendar=new FullCalendar.Calendar(document.getElementById('calendar'),{
            initialView:'dayGridMonth',initialDate:'2026-03-18',locale:'ko',height:'100%',
            headerToolbar:{left:'title',center:'',right:'today prev,next'},
            dayCellDidMount:function(arg){
                var topEl=arg.el.querySelector('.fc-daygrid-day-top');
                var vBox=document.createElement('div'); vBox.className='v-box'; vBox.innerHTML=vIconSvg;
                if(activeDate===arg.dateStr) vBox.classList.add('is-checked');
                topEl.prepend(vBox);
                if(holidays[arg.dateStr]){ var lbl=document.createElement('span'); lbl.className='holiday-label'; lbl.innerText=holidays[arg.dateStr]; topEl.appendChild(lbl); }
            },
            datesSet:function(){ setTimeout(function(){ applyCellSquare(); applyHolidayColors(); renderAllCellTodos(); },50); },
            dateClick:function(info){
                document.querySelectorAll('.v-box').forEach(function(b){ b.classList.remove('is-checked'); });
                if(activeDate===info.dateStr){ activeDate=""; saveAll(); MAX_VISIBLE=6; showRoutine(); refreshCalendar(); }
                else{
                    activeDate=info.dateStr; saveAll();
                    var vBox=info.dayEl.querySelector('.v-box'); if(vBox) vBox.classList.add('is-checked');
                    MAX_VISIBLE=5; showTodo(); refreshCalendar(); updateDisplay(info.dateStr,info.dayEl);
                }
            }
        });
        calendar.render();
        window.addEventListener('resize',function(){ setTimeout(function(){ calendar.updateSize(); setTimeout(applyCellSquare,100); },50); });
    } else { refreshCalendar(); }

    if(activeDate){ showTodo(); updateDisplay(activeDate); } else { showRoutine(); }
    ['routine','expense','report'].forEach(function(key){
        renderSection(key);
        document.getElementById('plus-'+key).onclick=function(){ openForm(key); };
        document.getElementById('fcancel-'+key).onclick=function(){ closeForm(key); };
        document.getElementById('fsave-'+key).onclick=function(){ saveForm(key); };
        document.getElementById('fbody-'+key).addEventListener('keydown',function(e){ if(e.key==='Enter'&&e.ctrlKey) saveForm(key); });
    });
    setSyncStatus('saved','● 저장됨');
}

function updateDisplay(dateStr,el){
    document.getElementById('selected-date-display').innerText=dateStr;
    document.querySelectorAll('.fc-daygrid-day').forEach(function(d){ d.classList.remove('selected-day'); });
    var target=el||document.querySelector('[data-date="'+dateStr+'"]');
    if(target) target.classList.add('selected-day'); renderList(dateStr);
}
function renderList(date){
    var listEl=document.getElementById('todo-list'); listEl.innerHTML='';
    (todos[date]||[]).forEach(function(t,i){
        var li=document.createElement('li'); li.className='todo-item';
        li.innerHTML='<span>'+t.text+'</span><button class="delete-btn" onclick="removeItem(\''+date+'\','+i+')">&#x2715;</button>';
        listEl.appendChild(li);
    });
}
window.removeItem=function(date,i){ todos[date].splice(i,1); if(!todos[date].length) delete todos[date]; saveAll(); renderList(date); renderCellTodos(date); };

/* ══════════════════════════════════════════════════
   DOMContentLoaded
══════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function(){

    async function doLogin(){
        var userId=document.getElementById('login-id').value.trim();
        var userPw=document.getElementById('login-pw').value;
        var errEl=document.getElementById('login-error');
        if(!userId||!userPw){ errEl.textContent='ID와 PW를 모두 입력하세요.'; return; }
        document.getElementById('login-btn').disabled=true; errEl.textContent='';
        document.getElementById('loading-overlay').classList.remove('hidden');
        document.getElementById('loading-text').textContent='로그인 중...';

        var userKey=hashStr(userId+'::'+userPw);
        var data=await sbGet(userKey);

        if(!data){
            /* 신규 계정 자동 생성 */
            document.getElementById('loading-text').textContent='계정을 생성하는 중...';
            var empty={activeDate:'',todos:{},wpData:{routine:[],expense:[],report:[]}};
            var ok=await sbUpsert(userKey,empty);
            if(!ok){
                document.getElementById('loading-overlay').classList.add('hidden');
                document.getElementById('login-btn').disabled=false;
                errEl.textContent='서버 연결 실패. SUPABASE_URL과 KEY를 확인하세요.';
                return;
            }
            data=empty;
        }

        document.getElementById('loading-overlay').classList.add('hidden');
        document.getElementById('login-btn').disabled=false;
        currentUserKey=userKey; currentUserId=userId;
        localStorage.setItem('planner_userKey',userKey);
        localStorage.setItem('planner_userId',userId);
        initApp(data);
    }

    document.getElementById('login-btn').onclick=doLogin;
    document.getElementById('login-id').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('login-pw').focus(); });
    document.getElementById('login-pw').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });

    /* 자동 로그인 */
    var savedKey=localStorage.getItem('planner_userKey'), savedId=localStorage.getItem('planner_userId');
    if(savedKey&&savedId){
        currentUserKey=savedKey; currentUserId=savedId;
        document.getElementById('loading-overlay').classList.remove('hidden');
        sbGet(savedKey).then(function(data){
            document.getElementById('loading-overlay').classList.add('hidden');
            if(data){ initApp(data); }
            else{ localStorage.removeItem('planner_userKey'); localStorage.removeItem('planner_userId'); }
        });
    }

    /* 로그아웃 */
    document.getElementById('logout-btn').onclick=function(){
        localStorage.removeItem('planner_userKey'); localStorage.removeItem('planner_userId');
        currentUserKey=null; currentUserId=null; activeDate=""; todos={}; wpData={routine:[],expense:[],report:[]};
        document.getElementById('top-bar').style.display='none';
        document.getElementById('app').classList.remove('visible');
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('login-id').value=''; document.getElementById('login-pw').value=''; document.getElementById('login-error').textContent='';
    };

    document.getElementById('close-todo-btn').onclick=function(){
        document.querySelectorAll('.v-box').forEach(function(b){ b.classList.remove('is-checked'); });
        activeDate=""; saveAll(); MAX_VISIBLE=6;
        document.getElementById('selected-date-display').innerText='날짜를 선택하세요';
        document.getElementById('todo-list').innerHTML='';
        document.querySelectorAll('.fc-daygrid-day').forEach(function(d){ d.classList.remove('selected-day'); });
        showRoutine(); refreshCalendar();
    };
    document.getElementById('add-btn').onclick=addTodo;
    document.getElementById('todo-input').addEventListener('keydown',function(e){ if(e.key==='Enter') addTodo(); });
    function addTodo(){
        var input=document.getElementById('todo-input'), date=document.getElementById('selected-date-display').innerText;
        if(!input.value.trim()||date==='날짜를 선택하세요') return;
        if(!todos[date]) todos[date]=[];
        todos[date].push({text:input.value}); saveAll(); renderList(date); renderCellTodos(date); input.value='';
    }
});
</script>
