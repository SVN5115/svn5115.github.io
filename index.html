<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강원소방본부 달력</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        :root { --main-bg: #f8f9fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--main-bg); margin: 0; }

        /* ── 인증 화면 공통 ── */
        .auth-screen { position: fixed; inset: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .auth-screen.hidden { display: none; }
        .auth-box { background: white; border-radius: 16px; padding: 40px 36px; width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); display: flex; flex-direction: column; }
        .auth-logo { text-align: center; margin-bottom: 24px; }
        .auth-logo .auth-icon { font-size: 36px; margin-bottom: 8px; }
        .auth-logo .auth-title { font-size: 17px; font-weight: bold; color: #1e293b; }
        .auth-logo .auth-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
        .auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .auth-field label { font-size: 11px; font-weight: bold; color: #64748b; }
        .auth-field input { padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: 'Malgun Gothic', sans-serif; outline: none; transition: border-color 0.15s; }
        .auth-field input:focus { border-color: #6366f1; }
        .auth-error { font-size: 11px; color: #ef4444; text-align: center; min-height: 16px; margin-bottom: 6px; }
        .auth-btn { width: 100%; padding: 11px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; transition: background 0.15s; margin-top: 4px; }
        .auth-btn:hover { background: #4f46e5; }
        .auth-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
        .auth-btn.green { background: #10b981; } .auth-btn.green:hover { background: #059669; }
        .auth-btn.gray { background: #94a3b8; } .auth-btn.gray:hover { background: #64748b; }
        .auth-divider { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
        .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
        .auth-divider span { font-size: 11px; color: #94a3b8; white-space: nowrap; }
        .pw-hint { font-size: 10px; margin-top: 4px; min-height: 14px; }
        .pw-hint.ok { color: #10b981; } .pw-hint.ng { color: #ef4444; }
        .auth-success { font-size: 12px; color: #10b981; text-align: center; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 10px; margin-top: 8px; display: none; }

        /* ── 상단 바 ── */
        #top-bar { position: fixed; top: 0; left: 0; right: 0; height: 36px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        #top-left { display: flex; align-items: center; gap: 10px; }
        #top-right { display: flex; align-items: center; gap: 10px; }
        #sync-indicator { font-size: 11px; color: #22c55e; }
        #sync-indicator.saving { color: #f59e0b; }
        #sync-indicator.saved  { color: #22c55e; }
        #sync-indicator.error  { color: #ef4444; }
        #user-label { font-size: 11px; color: #64748b; }
        #logout-btn { padding: 4px 12px; background: none; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; cursor: pointer; color: #64748b; font-family: 'Malgun Gothic', sans-serif; }
        #logout-btn:hover { background: #fef2f2; border-color: #fca5a5; color: #ef4444; }

        /* ── 알림 버튼 ── */
        #notify-btn { position: relative; background: none; border: none; cursor: pointer; font-size: 18px; padding: 2px 6px; line-height: 1; }
        #notify-badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 9px; font-weight: bold; border-radius: 50%; width: 16px; height: 16px; display: none; align-items: center; justify-content: center; }
        #notify-badge.visible { display: flex; }

        /* ── 관리자 패널 탭 ── */
        #admin-panel { position: fixed; top: 44px; left: 16px; width: 320px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 500; display: none; max-height: 500px; overflow: hidden; flex-direction: column; }
        #admin-panel.visible { display: flex; }
        #admin-panel-header { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        #admin-panel-header span { font-size: 13px; font-weight: bold; color: #1e293b; }
        #admin-panel-close { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 16px; }
        .admin-tabs { display: flex; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
        .admin-tab { flex: 1; padding: 8px; font-size: 12px; font-weight: bold; text-align: center; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Malgun Gothic', sans-serif; }
        .admin-tab.active { color: #6366f1; border-bottom-color: #6366f1; }
        .admin-tab-content { flex: 1; overflow-y: auto; min-height: 0; }
        .admin-tab-pane { display: none; }
        .admin-tab-pane.active { display: block; }

        /* ── 승인 요청 패널 ── */
        #request-panel { position: fixed; top: 44px; left: 16px; width: 280px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); z-index: 500; display: none; max-height: 400px; overflow-y: auto; }
        #request-panel.visible { display: block; }
        #request-panel-header { padding: 12px 14px; font-size: 13px; font-weight: bold; color: #1e293b; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        #request-panel-close { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 16px; line-height: 1; }
        .req-item { padding: 10px 14px; border-bottom: 1px solid #f8fafc; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .req-item:last-child { border-bottom: none; }
        .req-id { font-size: 13px; font-weight: bold; color: #334155; }
        .req-time { font-size: 10px; color: #94a3b8; margin-top: 2px; }
        .req-actions { display: flex; gap: 5px; flex-shrink: 0; }
        .req-approve { padding: 4px 10px; background: #10b981; color: white; border: none; border-radius: 5px; font-size: 11px; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; }
        .req-approve:hover { background: #059669; }
        .req-reject { padding: 4px 10px; background: none; border: 1px solid #fca5a5; color: #ef4444; border-radius: 5px; font-size: 11px; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; }
        .req-reject:hover { background: #fef2f2; }
        #request-empty { padding: 20px; text-align: center; font-size: 12px; color: #94a3b8; }
        .acc-item { padding: 10px 14px; border-bottom: 1px solid #f8fafc; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .acc-item:last-child { border-bottom: none; }
        .acc-info .acc-id { font-size: 13px; font-weight: bold; color: #334155; }
        .acc-info .acc-role { font-size: 10px; color: #94a3b8; margin-top: 1px; }
        .acc-del { padding: 4px 10px; background: none; border: 1px solid #fca5a5; color: #ef4444; border-radius: 5px; font-size: 11px; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; }
        .acc-del:hover { background: #fef2f2; }
        #account-empty { padding: 20px; text-align: center; font-size: 12px; color: #94a3b8; }

        /* ── 메인 앱 ── */
        #app { padding-top: 36px; height: 100vh; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
        .container { display: flex; width: 98%; max-width: 2400px; height: calc(96vh - 36px); gap: 15px; }
        #calendar-container { flex: 4; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; min-width: 0; }
        #calendar { flex: 1; }
        .side-panel { width: 230px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
        #routine-panel { display: flex; flex-direction: column; flex: 1; gap: 10px; min-height: 0; }
        #routine-panel.hidden { display: none; }
        .wp-section { flex: 1; background: white; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-radius: 10px; padding: 11px 12px 8px 12px; box-sizing: border-box; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        #sec-routine { border-top: 3px solid #6366f1; } #sec-expense { border-top: 3px solid #10b981; } #sec-report { border-top: 3px solid #f59e0b; }
        .wp-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-shrink: 0; }
        .wp-section-label { font-size: 12px; font-weight: bold; color: #334155; display: flex; align-items: center; gap: 4px; }
        #sec-routine .wp-section-label::before { content: '🔁'; } #sec-expense .wp-section-label::before { content: '💰'; } #sec-report .wp-section-label::before { content: '📋'; }
        .wp-plus-btn { width: 22px; height: 22px; border-radius: 50%; border: none; font-size: 16px; line-height: 1; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; }
        #sec-routine .wp-plus-btn { background: #6366f1; } #sec-routine .wp-plus-btn:hover { background: #4f46e5; }
        #sec-expense .wp-plus-btn { background: #10b981; } #sec-expense .wp-plus-btn:hover { background: #059669; }
        #sec-report  .wp-plus-btn { background: #f59e0b; } #sec-report  .wp-plus-btn:hover { background: #d97706; }
        .wp-add-form { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px; padding: 9px 10px 8px; margin-bottom: 8px; flex-shrink: 0; display: none; flex-direction: column; gap: 6px; }
        .wp-add-form.visible { display: flex; }
        .wp-add-form label { font-size: 10px; color: #64748b; font-weight: bold; }
        .wp-add-form input, .wp-add-form textarea { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 11px; font-family: 'Malgun Gothic', sans-serif; outline: none; box-sizing: border-box; resize: none; }
        .wp-add-form textarea { height: 56px; line-height: 1.5; }
        #sec-routine .wp-add-form input:focus, #sec-routine .wp-add-form textarea:focus { border-color: #6366f1; }
        #sec-expense .wp-add-form input:focus, #sec-expense .wp-add-form textarea:focus { border-color: #10b981; }
        #sec-report  .wp-add-form input:focus, #sec-report  .wp-add-form textarea:focus { border-color: #f59e0b; }
        .wp-form-actions { display: flex; justify-content: flex-end; gap: 5px; }
        .wp-form-cancel { padding: 4px 10px; background: none; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; cursor: pointer; color: #64748b; font-family: 'Malgun Gothic', sans-serif; }
        .wp-form-save { padding: 4px 12px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; color: white; font-family: 'Malgun Gothic', sans-serif; }
        #sec-routine .wp-form-save { background: #6366f1; } #sec-routine .wp-form-save:hover { background: #4f46e5; }
        #sec-expense .wp-form-save { background: #10b981; } #sec-expense .wp-form-save:hover { background: #059669; }
        #sec-report  .wp-form-save { background: #f59e0b; } #sec-report  .wp-form-save:hover { background: #d97706; }
        .wp-groups { flex: 1; overflow-y: auto; min-height: 0; }
        .wp-groups::-webkit-scrollbar { width: 4px; }
        .wp-groups::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .wp-group { margin-bottom: 8px; }
        .wp-group-header { display: flex; align-items: center; gap: 4px; padding: 4px 6px; border-radius: 5px; margin-bottom: 3px; user-select: none; cursor: grab; }
        .wp-group-header:active { cursor: grabbing; }
        .wp-group.dragging { opacity: 0.4; }
        .wp-group.drag-over { border-top: 2px solid #6366f1; }
        #sec-routine .wp-group-header { background: #ede9fe; } #sec-expense .wp-group-header { background: #d1fae5; } #sec-report .wp-group-header { background: #fef3c7; }
        .wp-group-toggle { font-size: 9px; color: #888; flex-shrink: 0; cursor: pointer; padding: 0 2px; }
        .wp-group-title { flex: 1; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        #sec-routine .wp-group-title { color: #4338ca; } #sec-expense .wp-group-title { color: #065f46; } #sec-report .wp-group-title { color: #92400e; }
        .wp-group-edit-btn { color: #94a3b8; border: none; background: none; font-size: 11px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
        .wp-group-edit-btn:hover { color: #6366f1; }
        .wp-group-del-btn { color: #cbd5e1; border: none; background: none; font-size: 12px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
        .wp-group-del-btn:hover { color: #f87171; }
        .wp-edit-form { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 9px 7px; margin: 4px 0 6px 0; display: none; flex-direction: column; gap: 5px; }
        .wp-edit-form.visible { display: flex; }
        .wp-edit-form label { font-size: 10px; color: #64748b; font-weight: bold; }
        .wp-edit-form input, .wp-edit-form textarea { width: 100%; padding: 5px 7px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; font-family: 'Malgun Gothic', sans-serif; outline: none; box-sizing: border-box; resize: none; }
        .wp-edit-form textarea { height: 52px; line-height: 1.5; }
        .wp-edit-actions { display: flex; justify-content: flex-end; gap: 5px; }
        .wp-edit-cancel { padding: 3px 9px; background: none; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; cursor: pointer; color: #64748b; font-family: 'Malgun Gothic', sans-serif; }
        .wp-edit-save { padding: 3px 10px; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; color: white; font-family: 'Malgun Gothic', sans-serif; }
        #sec-routine .wp-edit-save { background: #6366f1; } #sec-expense .wp-edit-save { background: #10b981; } #sec-report .wp-edit-save { background: #f59e0b; }
        .wp-item-list { list-style: none; padding: 0; margin: 0 0 0 14px; }
        .wp-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; border-bottom: 1px solid #f8fafc; font-size: 11px; color: #374151; }
        .wp-item:last-child { border-bottom: none; }
        .wp-item input[type="checkbox"] { width: 13px; height: 13px; flex-shrink: 0; cursor: pointer; margin-top: 2px; }
        #sec-routine .wp-item input[type="checkbox"] { accent-color: #6366f1; }
        #sec-expense .wp-item input[type="checkbox"] { accent-color: #10b981; }
        #sec-report  .wp-item input[type="checkbox"] { accent-color: #f59e0b; }
        .wp-item-text { flex: 1; word-break: break-all; line-height: 1.4; white-space: pre-wrap; }
        .wp-item-text.done { text-decoration: line-through; color: #9ca3af; }
        .wp-item-del { color: #ddd; cursor: pointer; border: none; background: none; font-size: 11px; padding: 0 1px; line-height: 1; flex-shrink: 0; }
        .wp-item-del:hover { color: #f87171; }
        .wp-empty { color: #c0c8d4; font-size: 11px; text-align: center; padding: 10px 0; }

        /* ── 지출 날짜 입력 폼 ── */
        .expense-date-row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; min-height: 28px; flex-shrink: 0; }
        .expense-date-row input[type="number"] { width: 56px; padding: 4px 6px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; font-family: 'Malgun Gothic', sans-serif; outline: none; }
        .expense-date-row input[type="number"]:focus { border-color: #10b981; }
        .expense-date-row input[type="text"] { flex: 1; padding: 4px 6px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; font-family: 'Malgun Gothic', sans-serif; outline: none; }
        .expense-date-row input[type="text"]:focus { border-color: #10b981; }
        .expense-date-row select { padding: 4px 5px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 11px; font-family: 'Malgun Gothic', sans-serif; outline: none; background: white; }
        .expense-date-row .rm-date-btn { background: none; border: none; color: #f87171; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
        .add-date-btn { font-size: 11px; color: #10b981; background: none; border: 1px dashed #10b981; border-radius: 4px; padding: 3px 8px; cursor: pointer; margin-top: 2px; font-family: 'Malgun Gothic', sans-serif; }
        .add-date-btn:hover { background: #f0fdf4; }

        /* ── 회의 팝업 ── */
        #meeting-popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; border-radius: 14px; padding: 24px;
            width: 380px; max-width: 95vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.18); z-index: 8000;
        }
        #meeting-popup.visible { display: block; }
        #meeting-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); z-index: 7999;
        }
        #meeting-overlay.visible { display: block; }
        .meeting-popup-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .meeting-popup-header h3 { margin: 0; font-size: 15px; color: #1e293b; }
        #meeting-close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #888; }
        .meeting-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .meeting-field label { font-size: 11px; font-weight: bold; color: #64748b; }
        .meeting-field input, .meeting-field textarea {
            padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 7px;
            font-size: 12px; font-family: 'Malgun Gothic', sans-serif; outline: none;
        }
        .meeting-field input:focus, .meeting-field textarea:focus { border-color: #eab308; }
        .meeting-field textarea { height: 80px; resize: none; line-height: 1.5; }
        .meeting-date-row { display: flex; gap: 8px; }
        .meeting-date-row input { flex: 1; }
        .meeting-popup-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
        .meeting-cancel-btn { padding: 7px 14px; background: none; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 12px; cursor: pointer; color: #64748b; font-family: 'Malgun Gothic', sans-serif; }
        .meeting-save-btn { padding: 7px 18px; background: #eab308; color: white; border: none; border-radius: 7px; font-size: 12px; font-weight: bold; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; }
        .meeting-save-btn:hover { background: #ca8a04; }
        /* 회의 마커 */
        .meeting-markers { position: absolute; right: 6px; display: flex; flex-wrap: wrap; gap: 2px; max-width: 80%; justify-content: flex-end; z-index: 1; }
        .meeting-tag { background: #fef08a; color: #713f12; border-radius: 3px; font-size: 8px; font-weight: bold; padding: 1px 4px; white-space: nowrap; line-height: 14px; height: 14px; box-sizing: border-box; cursor: pointer; }
        .meeting-tag:hover { background: #fde047; }
        .meeting-item { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 12px; }
        .meeting-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .meeting-item-title { font-size: 13px; font-weight: bold; color: #1e293b; }
        .meeting-item-date { font-size: 11px; color: #94a3b8; }
        .meeting-item-content { font-size: 12px; color: #475569; line-height: 1.5; white-space: pre-wrap; }
        .meeting-item-actions { display: flex; gap: 6px; margin-top: 8px; justify-content: flex-end; }
        .meeting-edit-btn { padding: 3px 10px; background: #eab308; color: white; border: none; border-radius: 5px; font-size: 11px; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; }
        .meeting-del-btn  { padding: 3px 10px; background: none; border: 1px solid #fca5a5; color: #ef4444; border-radius: 5px; font-size: 11px; cursor: pointer; font-family: 'Malgun Gothic', sans-serif; }

        /* ── 달력 셀 지출 마커 ── */
        .expense-markers { position: absolute; top: 4px; right: 6px; display: flex; flex-wrap: wrap; gap: 2px; max-width: 80%; justify-content: flex-end; z-index: 1; }
        .expense-tag { background: #ede9fe; color: #6d28d9; border-radius: 3px; font-size: 8px; font-weight: bold; padding: 1px 4px; white-space: nowrap; max-width: 60px; overflow: hidden; text-overflow: ellipsis; line-height: 14px; height: 14px; box-sizing: border-box; }
        .report-markers { position: absolute; top: 20px; right: 6px; display: flex; flex-wrap: wrap; gap: 2px; max-width: 80%; justify-content: flex-end; z-index: 1; }
        .report-tag { background: #fdf3e7; color: #92400e; border-radius: 3px; font-size: 8px; font-weight: bold; padding: 1px 4px; white-space: nowrap; max-width: 60px; overflow: hidden; text-overflow: ellipsis; line-height: 14px; height: 14px; box-sizing: border-box; }

var SUPABASE_URL = 'https://ummlnvrqyotuguqhzfvw.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtbWxudnJxeW90dWd1cWh6ZnZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzkxMjEsImV4cCI6MjA4OTQ1NTEyMX0.AmgcLv1MZYHkjbSVbfVHRFqvZ-KUJkzFmyLqKsr04GM';

/* ── 해시 ── */
function simpleHash(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
    return Math.abs(h).toString(36) + str.length.toString(36) + str.charCodeAt(0).toString(36);
}

/* ── 상태 표시 ── */
function setSyncStatus(cls, text) {
    var el = document.getElementById('sync-indicator');
    el.className = cls; el.textContent = text;
}

/* ════════════════════════════════════
   Supabase REST
════════════════════════════════════ */
function sbGet(table, key, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', SUPABASE_URL + '/rest/v1/' + table + '?key=eq.' + encodeURIComponent(key) + '&select=*', true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
    xhr.onload = function() {
        if (xhr.status === 200) {
            var rows = JSON.parse(xhr.responseText);
            callback(null, rows.length ? rows[0] : null);
        } else callback(new Error(xhr.responseText), null);
    };
    xhr.onerror = function() { callback(new Error('네트워크 오류'), null); };
    xhr.send();
}

function sbGetAll(table, filter, callback) {
    var url = SUPABASE_URL + '/rest/v1/' + table + (filter ? '?' + filter : '');
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
    xhr.onload = function() {
        if (xhr.status === 200) callback(null, JSON.parse(xhr.responseText));
        else callback(new Error(xhr.responseText), []);
    };
    xhr.onerror = function() { callback(new Error('네트워크 오류'), []); };
    xhr.send();
}

function sbUpsert(table, data, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SUPABASE_URL + '/rest/v1/' + table, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
    xhr.setRequestHeader('Prefer', 'resolution=merge-duplicates,return=minimal');
    xhr.onload = function() { if (callback) callback(xhr.status < 300 ? null : new Error(xhr.responseText)); };
    xhr.onerror = function() { if (callback) callback(new Error('네트워크 오류')); };
    xhr.send(JSON.stringify(Array.isArray(data) ? data : [data]));
}

function sbDelete(table, key, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('DELETE', SUPABASE_URL + '/rest/v1/' + table + '?key=eq.' + encodeURIComponent(key), true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
    xhr.onload = function() { if (callback) callback(xhr.status < 300 ? null : new Error(xhr.responseText)); };
    xhr.onerror = function() { if (callback) callback(new Error('네트워크 오류')); };
    xhr.send();
}

/* ════════════════════════════════════
   계정 관련
════════════════════════════════════ */
function getAccount(id, callback) {
    sbGet('planner_data', 'account_' + id, function(err, row) {
        callback(err, row ? row.value : null);
    });
}

function saveAccount(id, data, callback) {
    sbUpsert('planner_data', { key: 'account_' + id, value: data, updated_at: new Date().toISOString() }, callback);
}

function getPendingRequests(callback) {
    sbGetAll('account_requests', 'status=eq.pending&order=created_at.asc', callback);
}

function submitRequest(id, pw, callback) {
    sbUpsert('account_requests', {
        key: id, pw: simpleHash(pw), status: 'pending', created_at: new Date().toISOString()
    }, callback);
}

function approveRequest(id, pw, callback) {
    // 계정 생성
    saveAccount(id, { id: id, pw: pw, role: 'user', createdAt: new Date().toISOString() }, function(err) {
        if (err) { callback(err); return; }
        // 요청 삭제
        sbDelete('account_requests', id, callback);
    });
}

function rejectRequest(id, callback) {
    sbDelete('account_requests', id, callback);
}

function showScreen(name) {

}
function hideAllScreens() {

var notifyTimer = null;
function checkPendingRequests() {
    if (!currentUser || currentUser.id !== ADMIN_ID) return;
    getPendingRequests(function(err, rows) {
        if (err || !rows) return;
        var badge = document.getElementById('notify-badge');
        if (rows.length > 0) {
            badge.textContent = rows.length;
            badge.classList.add('visible');
        } else {
            badge.classList.remove('visible');
        }
    });
}

/* ── 계정 목록 조회 ── */
function getAllAccounts(callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', SUPABASE_URL + '/rest/v1/planner_data?key=like.account_' + encodeURIComponent('%') + '&select=key,value', true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
    xhr.onload = function() {
        if (xhr.status === 200) callback(null, JSON.parse(xhr.responseText));
        else callback(new Error(xhr.responseText), []);
    };
    xhr.onerror = function() { callback(new Error('네트워크 오류'), []); };
    xhr.send();
}

function deleteAccount(id, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('DELETE', SUPABASE_URL + '/rest/v1/planner_data?key=eq.' + encodeURIComponent('account_' + id), true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
    xhr.onload = function() { if (callback) callback(xhr.status < 300 ? null : new Error(xhr.responseText)); };
    xhr.onerror = function() { if (callback) callback(new Error('네트워크 오류')); };
    xhr.send();
}

function renderAccountList() {
    var list = document.getElementById('account-list');
    list.innerHTML = '<div style="padding:14px;font-size:11px;color:#94a3b8;">불러오는 중...</div>';
    getAllAccounts(function(err, rows) {
        list.innerHTML = '';
        if (err || !rows || rows.length === 0) {
            list.innerHTML = '<div id="account-empty">계정이 없습니다.</div>'; return;
        }
        rows.forEach(function(row) {
            var id = row.key.replace('account_', '');
            var role = (row.value && row.value.role) || 'user';
            var isAdmin = id === ADMIN_ID;
            var item = document.createElement('div');
            item.className = 'acc-item';
            item.innerHTML =
                '<div class="acc-info">' +
                '<div class="acc-id">' + (isAdmin ? '👑 ' : '👤 ') + id + '</div>' +
                '<div class="acc-role">' + (isAdmin ? '관리자' : '일반 사용자') + '</div>' +
                '</div>' +
                (!isAdmin ? '<button class="acc-del" data-id="' + id + '">삭제</button>' : '<span style="font-size:11px;color:#c0c8d4;">삭제 불가</span>');
            list.appendChild(item);
        });
        list.querySelectorAll('.acc-del').forEach(function(btn) {
            btn.onclick = function() {
                var id = this.getAttribute('data-id');
                if (!confirm('[' + id + '] 계정을 삭제하시겠습니까? 해당 계정의 모든 데이터도 함께 삭제됩니다.')) return;
                btn.disabled = true; btn.textContent = '삭제 중...';
                deleteAccount(id, function(err) {
                    if (err) { alert('삭제 실패: ' + err.message); btn.disabled=false; btn.textContent='삭제'; return; }
                    // 해당 사용자 데이터도 삭제
                    sbDelete('planner_data', PLANNER_KEY + id, function() {
                        renderAccountList();
                        alert('✅ [' + id + '] 계정이 삭제되었습니다.');
                    });
                });
            };
        });
    });
}

function renderRequestPanel() {
    getPendingRequests(function(err, rows) {
        var list = document.getElementById('request-list');
        list.innerHTML = '';
        var countEl = document.getElementById('req-count');
        if (rows && rows.length > 0) countEl.textContent = '(' + rows.length + ')';
        else countEl.textContent = '';
        if (err || !rows || rows.length === 0) {
            list.innerHTML = '<div id="request-empty">대기 중인 요청이 없습니다.</div>';
            return;
        }
        rows.forEach(function(row) {
            var item = document.createElement('div');
            item.className = 'req-item';
            var dt = new Date(row.created_at);
            var timeStr = (dt.getMonth()+1) + '/' + dt.getDate() + ' ' + dt.getHours() + ':' + ('0'+dt.getMinutes()).slice(-2);
            item.innerHTML =
                '<div><div class="req-id">👤 ' + row.key + '</div><div class="req-time">' + timeStr + '</div></div>' +
                '<div class="req-actions">' +
                '<button class="req-approve" data-id="' + row.key + '" data-pw="' + row.pw + '">승인</button>' +
                '<button class="req-reject" data-id="' + row.key + '">거절</button>' +
                '</div>';
            list.appendChild(item);
        });
        // 승인 버튼
        list.querySelectorAll('.req-approve').forEach(function(btn) {
            btn.onclick = function() {
                var id = this.getAttribute('data-id');
                var pw = this.getAttribute('data-pw');
                btn.disabled = true; btn.textContent = '처리 중...';
                approveRequest(id, pw, function(err) {
                    if (err) { alert('승인 실패: ' + err.message); btn.disabled=false; btn.textContent='승인'; return; }
                    renderRequestPanel();
                    checkPendingRequests();
                    alert('✅ ' + id + ' 계정이 승인되었습니다.');
                });
            };
        });
        // 거절 버튼
        list.querySelectorAll('.req-reject').forEach(function(btn) {
            btn.onclick = function() {
                var id = this.getAttribute('data-id');
                if (!confirm(id + ' 요청을 거절하시겠습니까?')) return;
                rejectRequest(id, function(err) {
                    if (err) { alert('처리 실패: ' + err.message); return; }
                    renderRequestPanel();
                    checkPendingRequests();
                });
            };
        });
    });
}

function getUserDataKey() { return PLANNER_KEY + currentUser.id; }

function loadData(callback) {
    setSyncStatus('saving', '● 불러오는 중...');
    sbGet('planner_data', getUserDataKey(), function(err, row) {
        setSyncStatus(err ? 'error' : 'saved', err ? '● 연결 실패' : '● 저장됨');
        callback(row ? row.value : null);
    });
}

function saveData() {
    clearTimeout(saveTimer);
    setSyncStatus('saving', '● 저장 중...');
    saveTimer = setTimeout(function() {
        sbUpsert('planner_data', {
            key: getUserDataKey(),
            value: { activeDate: activeDate, todos: todos, wpData: wpData },
            updated_at: new Date().toISOString()
        }, function(err) {
            setSyncStatus(err ? 'error' : 'saved', err ? '● 저장 실패' : '● 저장됨');
            renderExpenseMarkers();
            renderMeetingMarkers();
            renderReportMarkers();
        });
    }, 600);
}

function getReportDates() {

    rows.forEach(function(row) {

          '<option value="monthly"' + (!isOnce?' selected':'') + '>매월 반복</option>' +
          '<option value="once"'   + (isOnce?' selected':'') + '>특정일만</option>' +
        '</select>' +

    var monthDiv = document.createElement('div');
    monthDiv.style.cssText = 'display:' + (isOnce?'flex':'none') + ';align-items:center;gap:5px;padding-left:4px;';

        '<label style="font-size:10px;color:#94a3b8;">일</label>';

            monthDiv.style.display = 'flex';

            monthDiv.style.display = 'none';
        }
    });

function getDates(listId) {
    var rows = document.querySelectorAll('#' + listId + ' .expense-date-row');
    var result = [];
    rows.forEach(function(row) {
        var dayEl    = row.querySelector('.ei-day');
        var labelEl  = row.querySelector('.ei-label');
        var repeatEl = row.querySelector('.ei-repeat');
        if (!dayEl || !repeatEl) return;
        var day    = parseInt(dayEl.value);
        var label  = labelEl ? labelEl.value.trim() : '';
        var repeat = repeatEl.value;
        if (repeat === 'once') {
            // 특정일: 월/일 따로 저장
            var monthEl  = row.querySelector('.ei-month');
            var specDayEl = row.querySelector('.ei-specific-day');
            var month = monthEl ? parseInt(monthEl.value) : null;
            var specDay = specDayEl ? parseInt(specDayEl.value) : day;
            if (month >= 1 && month <= 12 && specDay >= 1 && specDay <= 31) {
                // specificDate: MM-DD 형식으로 저장
                var mm = ('0' + month).slice(-2);
                var dd = ('0' + specDay).slice(-2);
                result.push({ day: specDay, label: label, repeat: 'once', specificMonth: month, specificDay: specDay, specificMMDD: mm + '-' + dd });
            }
        } else {
            if (day >= 1 && day <= 31) result.push({ day: day, label: label, repeat: 'monthly' });
        }
    });
    return result;
}
function getExpenseDates() { return getDates('expense-date-list'); }
function getReportDates()  { return getDates('report-date-list'); }

function clearExpenseDateList() { document.getElementById('expense-date-list').innerHTML = ''; }
function clearReportDateList()  { document.getElementById('report-date-list').innerHTML = ''; }

/* ── 달력에 보고 마커 렌더링 ── */
function renderReportMarkers() {
    document.querySelectorAll('.report-markers').forEach(function(el){ el.parentNode.removeChild(el); });
    var reportGroups = wpData.report || [];
    document.querySelectorAll('.fc-daygrid-day').forEach(function(cell) {
        var dateStr = cell.getAttribute('data-date');
        if (!dateStr) return;
        var day = parseInt(dateStr.split('-')[2]);
        var tags = [];
        reportGroups.forEach(function(g) {
            if (!g.dates) return;
            g.dates.forEach(function(d) {
                var match = d.repeat === 'monthly' ? (d.day === day) : (d.specificDate === dateStr);
                if (match) {
                    tags.push({ title: g.title, label: '보고' });
                }
            });
        });
        if (tags.length === 0) return;
        var frame = cell.querySelector('.fc-daygrid-day-frame');
        if (!frame) return;
        var wrap = document.createElement('div');
        wrap.className = 'report-markers';
        tags.forEach(function(t) {
            var tag = document.createElement('div');
            tag.className = 'report-tag';
            tag.title = t.title;
            tag.textContent = t.label;
            wrap.appendChild(tag);
        });
        frame.appendChild(wrap);
    });
}

/* ── 달력에 지출/보고 마커 렌더링 ── */
function renderExpenseMarkers() {
    document.querySelectorAll('.expense-markers, .report-markers').forEach(function(el){ el.parentNode.removeChild(el); });

    document.querySelectorAll('.fc-daygrid-day').forEach(function(cell) {
        var dateStr = cell.getAttribute('data-date');
        if (!dateStr) return;
        var day = parseInt(dateStr.split('-')[2]);
        var frame = cell.querySelector('.fc-daygrid-day-frame');
        if (!frame) return;

        // 지출 마커 - 중복 제거
        var expTags = [];
        var expSeen = {};
        var mmdd = dateStr.slice(5); // MM-DD
        (wpData.expense || []).forEach(function(g) {
            if (!g.dates) return;
            g.dates.forEach(function(d) {
                var match = d.repeat === 'monthly'
                    ? (d.day === day)
                    : (d.specificMMDD === mmdd);
                if (match) {
                    var lbl = '지출';
                    if (!expSeen[lbl]) { expSeen[lbl] = true; expTags.push({ title: g.title, label: lbl }); }
                }
            });
        });
        if (expTags.length > 0) {
            var expWrap = document.createElement('div');
            expWrap.className = 'expense-markers';
            expTags.forEach(function(t) {
                var tag = document.createElement('div'); tag.className = 'expense-tag';
                tag.title = t.title; tag.textContent = t.label; expWrap.appendChild(tag);
            });
            frame.appendChild(expWrap);
        }

        // 보고 마커 (지출 아래) - 같은 label 중복 제거
        var repTags = [];
        var repSeen = {};
        (wpData.report || []).forEach(function(g) {
            if (!g.dates) return;
            g.dates.forEach(function(d) {
                var match = d.repeat === 'monthly'
                    ? (d.day === day)
                    : (d.specificMMDD === mmdd);
                if (match) {
                    var lbl = '보고';
                    if (!repSeen[lbl]) { repSeen[lbl] = true; repTags.push({ title: g.title, label: lbl }); }
                }
            });
        });
        if (repTags.length > 0) {
            var repWrap = document.createElement('div');
            repWrap.className = 'report-markers';
            repWrap.style.top = (4 + (expTags.length > 0 ? 18 : 0)) + 'px';
            repTags.forEach(function(t) {
                var tag = document.createElement('div'); tag.className = 'report-tag';
                tag.title = t.title; tag.textContent = t.label; repWrap.appendChild(tag);
            });
            frame.appendChild(repWrap);
        }
    });
}

var meetingEditIdx = null; // 수정 중인 인덱스 (-1: 신규)
var meetingViewDate = null; // 목록 뷰의 날짜

function showMeetingListView(dateStr) {
    meetingViewDate = dateStr;
    var parts = dateStr.split('-');
    document.getElementById('meeting-popup-title').textContent = '📋 회의 일정';
    document.getElementById('meeting-list-date').textContent = parts[0] + '년 ' + parseInt(parts[1]) + '월 ' + parseInt(parts[2]) + '일';
    document.getElementById('meeting-list-view').style.display = 'block';
    document.getElementById('meeting-form-view').style.display = 'none';
    renderMeetingListItems(dateStr);
}

function renderMeetingListItems(dateStr) {
    var container = document.getElementById('meeting-list-items');
    container.innerHTML = '';
    var meetings = (wpData.meetings || []).filter(function(m){ return m.date === dateStr; });
    if (meetings.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#94a3b8;font-size:12px;padding:16px 0;">등록된 회의가 없습니다.</div>';
        return;
    }
    meetings.forEach(function(m) {
        var globalIdx = wpData.meetings.indexOf(m);
        var item = document.createElement('div');
        item.className = 'meeting-item';
        item.innerHTML =
            '<div class="meeting-item-header">' +
                '<div class="meeting-item-title">📋 ' + m.title + '</div>' +
            '</div>' +
            (m.content ? '<div class="meeting-item-content">' + m.content + '</div>' : '') +
            '<div class="meeting-item-actions">' +
                '<button class="meeting-edit-btn" data-idx="' + globalIdx + '">수정</button>' +
                '<button class="meeting-del-btn"  data-idx="' + globalIdx + '">삭제</button>' +
            '</div>';
        item.querySelector('.meeting-edit-btn').onclick = function() {
            showMeetingFormView(parseInt(this.getAttribute('data-idx')));
        };
        item.querySelector('.meeting-del-btn').onclick = function() {
            var idx = parseInt(this.getAttribute('data-idx'));
            if (!confirm('이 회의 일정을 삭제하시겠습니까?')) return;
            wpData.meetings.splice(idx, 1);
            saveAll(); renderMeetingMarkers();
            renderMeetingListItems(dateStr);
        };
        container.appendChild(item);
    });
}

function showMeetingFormView(editIdx) {
    meetingEditIdx = editIdx;
    var isEdit = editIdx !== null && editIdx >= 0;
    document.getElementById('meeting-popup-title').textContent = isEdit ? '📋 회의 수정' : '📋 회의 등록';
    document.getElementById('meeting-list-view').style.display = 'none';
    document.getElementById('meeting-form-view').style.display = 'block';
    document.getElementById('meeting-error').textContent = '';
    if (isEdit) {
        var m = wpData.meetings[editIdx];
        var parts = m.date.split('-');
        document.getElementById('meeting-month').value   = parseInt(parts[1]);
        document.getElementById('meeting-day').value     = parseInt(parts[2]);
        document.getElementById('meeting-title').value   = m.title;
        document.getElementById('meeting-content').value = m.content || '';
    } else {
        var now = calendar.getDate();
        var parts2 = (meetingViewDate || '').split('-');
        document.getElementById('meeting-month').value   = parts2[1] ? parseInt(parts2[1]) : (now.getMonth()+1);
        document.getElementById('meeting-day').value     = parts2[2] ? parseInt(parts2[2]) : now.getDate();
        document.getElementById('meeting-title').value   = '';
        document.getElementById('meeting-content').value = '';
    }
    document.getElementById('meeting-title').focus();
}

function openMeetingPopup(dateStr) {
    if (!wpData.meetings) wpData.meetings = [];
    document.getElementById('meeting-popup').classList.add('visible');
    document.getElementById('meeting-overlay').classList.add('visible');
    if (dateStr) {
        showMeetingListView(dateStr);
    } else {
        // 헤더 버튼 클릭: 신규 등록 폼 바로
        meetingViewDate = null;
        showMeetingFormView(-1);
    }
}
function closeMeetingPopup() {
    document.getElementById('meeting-popup').classList.remove('visible');
    document.getElementById('meeting-overlay').classList.remove('visible');
}
function saveMeeting() {
    var month   = parseInt(document.getElementById('meeting-month').value);
    var day     = parseInt(document.getElementById('meeting-day').value);
    var title   = document.getElementById('meeting-title').value.trim();
    var content2 = document.getElementById('meeting-content').value.trim();
    var err     = document.getElementById('meeting-error');
    if (!month||month<1||month>12) { err.textContent='월을 입력하세요(1~12)'; return; }
    if (!day||day<1||day>31)       { err.textContent='일을 입력하세요(1~31)'; return; }
    if (!title)                    { err.textContent='회의 제목을 입력하세요'; document.getElementById('meeting-title').focus(); return; }
    var year = calendar.getDate().getFullYear();
    var mm = ('0'+month).slice(-2), dd = ('0'+day).slice(-2);
    var dateStr = year + '-' + mm + '-' + dd;
    if (!wpData.meetings) wpData.meetings = [];
    if (meetingEditIdx !== null && meetingEditIdx >= 0) {
        // 수정
        wpData.meetings[meetingEditIdx] = { date: dateStr, title: title, content: content2, updatedAt: new Date().toISOString() };
    } else {
        // 신규
        wpData.meetings.push({ date: dateStr, title: title, content: content2, createdAt: new Date().toISOString() });
    }
    saveAll(); renderMeetingMarkers();
    if (meetingViewDate) {
        showMeetingListView(dateStr);
    } else {
        closeMeetingPopup();
    }
}

function renderMeetingMarkers() {
    document.querySelectorAll('.meeting-markers').forEach(function(el){ el.parentNode.removeChild(el); });
    if (!wpData.meetings || !wpData.meetings.length) return;
    // 날짜별로 그룹핑
    var byDate = {};
    wpData.meetings.forEach(function(m) {
        if (!byDate[m.date]) byDate[m.date] = [];
        byDate[m.date].push(m);
    });
    Object.keys(byDate).forEach(function(dateStr) {
        var cell = document.querySelector('.fc-daygrid-day[data-date="' + dateStr + '"]');
        if (!cell) return;
        var frame = cell.querySelector('.fc-daygrid-day-frame');
        if (!frame) return;
        // 지출/보고 마커 높이 계산
        var expH = frame.querySelector('.expense-markers') ? 18 : 0;
        var repH = frame.querySelector('.report-markers')  ? 18 : 0;
        var wrap = document.createElement('div');
        wrap.className = 'meeting-markers';
        wrap.style.top = (4 + expH + repH) + 'px';
        var tag = document.createElement('div');
        tag.className = 'meeting-tag';
        tag.title = byDate[dateStr].map(function(m){ return m.title; }).join(', ');
        tag.textContent = '회의';
        (function(ds){ tag.onclick = function(e){ e.stopPropagation(); openMeetingPopup(ds); }; })(dateStr);
        wrap.appendChild(tag);
        frame.appendChild(wrap);
    });
}

function saveAll() { saveData(); }

/* ════════════════════════════════════
   섹션 렌더
════════════════════════════════════ */
function renderSection(key) {
    var container = document.getElementById('groups-' + key);
    container.innerHTML = '';
    var groups = wpData[key] || [];
    if (!groups.length) {
        var e = document.createElement('div'); e.className = 'wp-empty';
        e.textContent = '+ 버튼으로 항목을 추가하세요'; container.appendChild(e); return;
    }
    groups.forEach(function(g, gi) {
        var gDiv = document.createElement('div'); gDiv.className = 'wp-group'; gDiv.draggable = true; gDiv.setAttribute('data-idx', gi);
        var hdr  = document.createElement('div'); hdr.className = 'wp-group-header';
        var tog  = document.createElement('span'); tog.className = 'wp-group-toggle'; tog.textContent = g.open !== false ? '▼' : '▶';
        var ttl  = document.createElement('span'); ttl.className = 'wp-group-title'; ttl.textContent = g.title;
        var editBtn = document.createElement('button'); editBtn.className = 'wp-group-edit-btn'; editBtn.innerHTML = '✏️';
        var delBtn  = document.createElement('button'); delBtn.className  = 'wp-group-del-btn';  delBtn.innerHTML  = '✕';
        (function(k, idx) {
            tog.onclick = ttl.onclick = function() { toggleGroup(k, idx); };
            delBtn.onclick = function(e) { e.stopPropagation(); wpData[k].splice(idx,1); saveAll(); renderSection(k); };
            editBtn.onclick = function(e) {
                e.stopPropagation();
                var ef = gDiv.querySelector('.wp-edit-form'), wasOpen = ef.classList.contains('visible');
                container.querySelectorAll('.wp-edit-form.visible').forEach(function(f){ f.classList.remove('visible'); });
                if (!wasOpen) {
                    ef.querySelector('.wp-ei-title').value = wpData[k][idx].title;
                    ef.querySelector('.wp-ei-body').value  = wpData[k][idx].body || '';
                    // 지출/보고 날짜 불러오기
                    if (k === 'expense' || k === 'report') {
                        var listId = 'edit-date-list-' + k + '-' + idx;
                        var dateList = ef.querySelector('#' + listId);
                        if (dateList) {
                            dateList.innerHTML = '';
                            var existDates = wpData[k][idx].dates || [];
                            existDates.forEach(function(d) { addDateRow(listId, d.day, d.label||'', d.repeat||'monthly', d.specificMonth||''); });
                        }
                    }
                    ef.classList.add('visible');
                    ef.querySelector('.wp-ei-title').focus();
                }
            };
        })(key, gi);
        hdr.appendChild(tog); hdr.appendChild(ttl); hdr.appendChild(editBtn); hdr.appendChild(delBtn);
        // 날짜 뱃지 (지출: 보라, 보고: 갈색)
        if ((key === 'expense' || key === 'report') && g.dates && g.dates.length > 0) {
            var datesBadge = document.createElement('span');
            var isExpense = key === 'expense';
            datesBadge.style.cssText = 'font-size:9px;color:' + (isExpense?'#7c3aed':'#92400e') + ';background:' + (isExpense?'#ede9fe':'#fdf3e7') + ';border-radius:3px;padding:1px 5px;margin-left:2px;flex-shrink:0;';
            datesBadge.textContent = key === 'expense' ? '지출' : '보고';
            hdr.appendChild(datesBadge);
        }

        gDiv.appendChild(hdr);
        var ef = document.createElement('div'); ef.className = 'wp-edit-form';
        // 지출/보고는 날짜 입력 UI 포함
        var dateHtml = '';
        if (key === 'expense' || key === 'report') {
            var dateColor = key === 'expense' ? '#10b981' : '#f59e0b';
            var listId    = 'edit-date-list-' + key + '-' + gi;
            dateHtml = '<div style="margin-top:4px;">' +
                '<label style="font-size:10px;color:#64748b;font-weight:bold;">' + (key==='expense'?'지출':'보고') + ' 날짜</label>' +
                '<div id="' + listId + '" style="margin-top:4px;max-height:100px;overflow-y:auto;"></div>' +
                '<button class="add-date-btn wp-ei-add-date" style="margin-top:5px;border-color:' + dateColor + ';color:' + dateColor + ';">+ 날짜 추가</button>' +
                '</div>';
        }
        ef.innerHTML = '<div><label>대제목</label><input class="wp-ei-title"></div>' +
            '<div><label>내용</label><textarea class="wp-ei-body"></textarea></div>' +
            dateHtml +
            '<div class="wp-edit-actions"><button class="wp-edit-cancel">취소</button><button class="wp-edit-save">저장</button></div>';
        (function(k, idx) {
            ef.querySelector('.wp-edit-cancel').onclick = function() { ef.classList.remove('visible'); };
            ef.querySelector('.wp-edit-save').onclick = function() {
                var nt=ef.querySelector('.wp-ei-title').value.trim(), nb=ef.querySelector('.wp-ei-body').value.trim();
                if(!nt){ ef.querySelector('.wp-ei-title').focus(); return; }
                wpData[k][idx].title=nt; wpData[k][idx].body=nb; wpData[k][idx].checked={};
                // 지출/보고 날짜 저장
                if (k === 'expense' || k === 'report') {
                    var listId = 'edit-date-list-' + k + '-' + idx;
                    wpData[k][idx].dates = getDates(listId);
                }
                saveAll(); renderSection(k);
            };
            ef.querySelector('.wp-ei-body').addEventListener('keydown', function(ev){ if(ev.key==='Enter'&&ev.ctrlKey) ef.querySelector('.wp-edit-save').click(); });
            // 날짜 추가 버튼
            var addBtn = ef.querySelector('.wp-ei-add-date');
            if (addBtn) {
                addBtn.onclick = function() {
                    var listId = 'edit-date-list-' + k + '-' + idx;
                    addDateRow(listId, '', '', 'monthly');
                };
            }
        })(key, gi);
        gDiv.appendChild(ef);
        if (g.open !== false) {
            var ul = document.createElement('ul'); ul.className = 'wp-item-list';
            var lines = (g.body||'').split('\n').filter(function(l){ return l.trim(); });
            lines.forEach(function(line, li) {
                var item = document.createElement('li'); item.className = 'wp-item';
                var cb = document.createElement('input'); cb.type='checkbox'; cb.checked=!!(g.checked&&g.checked[li]);
                var span = document.createElement('span'); span.className='wp-item-text'+(cb.checked?' done':''); span.textContent=line;
                var idel = document.createElement('button'); idel.className='wp-item-del'; idel.innerHTML='✕';
                (function(k, idx, capturedLi) {
                    cb.onchange = function() { if(!wpData[k][idx].checked) wpData[k][idx].checked={}; wpData[k][idx].checked[capturedLi]=cb.checked; saveAll(); renderSection(k); };
                    idel.onclick = function() {
                        var ls=(wpData[k][idx].body||'').split('\n').filter(function(l){ return l.trim(); });
                        ls.splice(capturedLi,1); wpData[k][idx].body=ls.join('\n');
                        var nc={}; ls.forEach(function(_,ni){ var oi=ni<capturedLi?ni:ni+1; if(g.checked&&g.checked[oi]) nc[ni]=true; });
                        wpData[k][idx].checked=nc; saveAll(); renderSection(k);
                    };
                })(key, gi, li);
                item.appendChild(cb); item.appendChild(span); item.appendChild(idel); ul.appendChild(item);
            });
            gDiv.appendChild(ul);
        }
        container.appendChild(gDiv);
    });

    // ── 드래그 앤 드롭 순서 변경 ──
    var dragSrcIdx = null;
    container.querySelectorAll('.wp-group').forEach(function(gEl) {
        gEl.addEventListener('dragstart', function(e) {
            dragSrcIdx = parseInt(this.getAttribute('data-idx'));
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        gEl.addEventListener('dragend', function() {
            this.classList.remove('dragging');
            container.querySelectorAll('.wp-group').forEach(function(g){ g.classList.remove('drag-over'); });
        });
        gEl.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            container.querySelectorAll('.wp-group').forEach(function(g){ g.classList.remove('drag-over'); });
            this.classList.add('drag-over');
        });
        gEl.addEventListener('drop', function(e) {
            e.preventDefault();
            var targetIdx = parseInt(this.getAttribute('data-idx'));
            if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
            // 배열에서 순서 변경
            var moved = wpData[key].splice(dragSrcIdx, 1)[0];
            wpData[key].splice(targetIdx, 0, moved);
            saveAll();
            renderSection(key);
        });
    });
}

function toggleGroup(key,gi){ wpData[key][gi].open=(wpData[key][gi].open===false)?true:false; saveAll(); renderSection(key); }
function openForm(key){
    ['routine','expense','report'].forEach(function(k){
        document.getElementById('form-'+k).classList.remove('visible');
        document.getElementById('ftitle-'+k).value='';
        document.getElementById('fbody-'+k).value='';
    });
    document.getElementById('form-'+key).classList.add('visible');
    document.getElementById('ftitle-'+key).focus();
}
function closeForm(key){
    document.getElementById('form-'+key).classList.remove('visible');
    document.getElementById('ftitle-'+key).value='';
    document.getElementById('fbody-'+key).value='';
    if (key === 'expense') clearExpenseDateList();
    if (key === 'report')  clearReportDateList();
}
function saveForm(key){
    var title=document.getElementById('ftitle-'+key).value.trim(), body=document.getElementById('fbody-'+key).value.trim();
    if(!title){ document.getElementById('ftitle-'+key).focus(); return; }
    var item = {title:title, body:body, open:true, checked:{}};
    if (key === 'expense') { item.dates = getExpenseDates(); }
    if (key === 'report')  { item.dates = getReportDates(); }
    wpData[key].push(item); saveAll(); renderSection(key); closeForm(key);
}
function showRoutine(){ document.getElementById('routine-panel').classList.remove('hidden'); document.getElementById('todo-section').classList.add('hidden'); }
function showTodo()   { document.getElementById('routine-panel').classList.add('hidden');    document.getElementById('todo-section').classList.remove('hidden'); }

function applyCellSquare(){
    var calEl=document.getElementById('calendar'); if(!calEl) return;
    var toolbar=calEl.querySelector('.fc-header-toolbar'), colHeader=calEl.querySelector('.fc-col-header');
    var rows=calEl.querySelectorAll('.fc-daygrid-body tr'), rowCount=rows.length||6;
    var cellH=Math.floor((calEl.offsetHeight-(toolbar?toolbar.offsetHeight:0)-(colHeader?colHeader.offsetHeight:0)-2)/rowCount);
    document.querySelectorAll('.fc-daygrid-day-frame').forEach(function(f){ f.style.setProperty('height',cellH+'px','important'); });
}
function applyHolidayColors(){
    Object.keys(holidays).forEach(function(d){
        var cell=document.querySelector('.fc-daygrid-day[data-date="'+d+'"]'); if(!cell) return;
        var n=cell.querySelector('.fc-daygrid-day-number');
        if(n) n.setAttribute('style','color:#ff0000!important;font-weight:bold;text-decoration:none;padding:0;');
    });
}
function renderCellTodos(dateStr){
    var cell=document.querySelector('.fc-daygrid-day[data-date="'+dateStr+'"]'); if(!cell) return;
    ['cell-todos','cell-todo-more'].forEach(function(cls){ var el=cell.querySelector('.'+cls); if(el) el.parentNode.removeChild(el); });
    var items=todos[dateStr]||[]; if(!items.length) return;
    var frame=cell.querySelector('.fc-daygrid-day-frame');
    var wrap=document.createElement('div'); wrap.className='cell-todos';
    wrap.style.gap=(MAX_VISIBLE<=5?'7px':'4px');
    items.slice(0,MAX_VISIBLE).forEach(function(t,idx){
        var tag=document.createElement('div'); tag.className='cell-todo-item cell-todo-c'+(idx%2);
        tag.title=t.text; tag.textContent=t.text; wrap.appendChild(tag);
    });
    frame.appendChild(wrap);
    var extra=items.length-MAX_VISIBLE;
    if(extra>0){ var more=document.createElement('div'); more.className='cell-todo-more'; more.textContent='+'+extra; frame.appendChild(more); }
}
function renderAllCellTodos(){ Object.keys(todos).forEach(renderCellTodos); }
function refreshCalendar(){ setTimeout(function(){ calendar.updateSize(); setTimeout(function(){ applyCellSquare(); renderAllCellTodos(); },100); },50); }

function updateDisplay(dateStr, el) {
    document.getElementById('selected-date-display').innerText = dateStr;
    document.querySelectorAll('.fc-daygrid-day').forEach(function(d){ d.classList.remove('selected-day'); });
    var target = el || document.querySelector('[data-date="'+dateStr+'"]');
    if (target) target.classList.add('selected-day');
    renderList(dateStr);
    // 전체 삭제 버튼 표시 여부
    var clearBtn = document.getElementById('clear-all-btn');
    if (clearBtn) clearBtn.style.display = (todos[dateStr] && todos[dateStr].length > 0) ? 'block' : 'none';
}
function renderList(date) {
    var listEl=document.getElementById('todo-list'); listEl.innerHTML='';
    var clearBtn=document.getElementById('clear-all-btn'); if(clearBtn) clearBtn.style.display=(todos[date]&&todos[date].length>0)?'inline-block':'none';
    (todos[date]||[]).forEach(function(t,i){
        var li = document.createElement('li'); li.className = 'todo-item';
        var cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = !!t.done;
        var span = document.createElement('span'); span.className = 'todo-text' + (t.done ? ' done' : ''); span.textContent = t.text;
        var btn = document.createElement('button'); btn.className = 'delete-btn'; btn.innerHTML = '&#x2715;';
        (function(d, idx) {
            cb.onchange = function() {
                todos[d][idx].done = cb.checked;
                span.className = 'todo-text' + (cb.checked ? ' done' : '');
                saveAll();
            };
            btn.onclick = function() { removeItem(d, idx); };
        })(date, i);
        li.appendChild(cb); li.appendChild(span); li.appendChild(btn);
        listEl.appendChild(li);
    });
}
window.removeItem = function(date,i){
    todos[date].splice(i,1); if(!todos[date].length) delete todos[date];
    saveAll(); renderList(date); renderCellTodos(date);
};

/* ════════════════════════════════════
   DOMContentLoaded
════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {

    /* ── 로그인 화면 ── */
    function doLogin() {
        var id  = document.getElementById('login-id').value.trim();
        var pw  = document.getElementById('login-pw').value;
        var err = document.getElementById('login-error');
        if (!id || !pw) { err.textContent='아이디와 비밀번호를 입력하세요.'; return; }
        var btn = document.getElementById('login-btn');
        btn.disabled=true; btn.textContent='확인 중...'; err.textContent='';
        getAccount(id, function(accErr, acc) {
            if (accErr || !acc) {
                err.textContent='아이디 또는 비밀번호가 틀렸습니다.';
                btn.disabled=false; btn.textContent='로그인'; return;
            }
            if (acc.pw !== simpleHash(pw)) {
                err.textContent='아이디 또는 비밀번호가 틀렸습니다.';
                btn.disabled=false; btn.textContent='로그인'; return;
            }
            currentUser = acc;
            sessionStorage.setItem('planner_user', JSON.stringify(acc));
            hideAllScreens();
            enterApp();
        });
    }
    document.getElementById('login-btn').onclick = doLogin;
    document.getElementById('login-pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    document.getElementById('login-id').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('login-pw').focus(); });
    document.getElementById('goto-signup-btn').onclick = function() { showScreen('signup-screen'); };

    /* ── 계정 생성 요청 화면 ── */
    document.getElementById('signup-pw2').addEventListener('input', function() {
        var pw=document.getElementById('signup-pw').value, pw2=this.value;
        var hint=document.getElementById('signup-pw-hint');
        if (!pw2) { hint.textContent=''; return; }
        if (pw===pw2) { hint.textContent='✓ 일치'; hint.className='pw-hint ok'; }
        else          { hint.textContent='✗ 불일치'; hint.className='pw-hint ng'; }
    });
    document.getElementById('signup-btn').onclick = function() {
        var id=document.getElementById('signup-id').value.trim();
        var pw=document.getElementById('signup-pw').value;
        var pw2=document.getElementById('signup-pw2').value;
        var err=document.getElementById('signup-error');
        if (!id||id.length<2) { err.textContent='아이디는 2자 이상이어야 합니다.'; return; }
        if (id===ADMIN_ID) { err.textContent='사용할 수 없는 아이디입니다.'; return; }
        if (!pw||pw.length<4) { err.textContent='비밀번호는 4자 이상이어야 합니다.'; return; }
        if (pw!==pw2) { err.textContent='비밀번호가 일치하지 않습니다.'; return; }
        var btn=document.getElementById('signup-btn');
        btn.disabled=true; btn.textContent='전송 중...'; err.textContent='';
        // 이미 계정이 있는지 확인
        getAccount(id, function(accErr, acc) {
            if (acc) { err.textContent='이미 존재하는 아이디입니다.'; btn.disabled=false; btn.textContent='요청 보내기'; return; }
            submitRequest(id, pw, function(e) {
                if (e) { err.textContent='전송 실패: '+e.message; btn.disabled=false; btn.textContent='요청 보내기'; return; }
                document.getElementById('signup-success').style.display='block';
                btn.style.display='none';
            });
        });
    };
    document.getElementById('goto-login-btn').onclick = function() {
        showScreen('login-screen');
        document.getElementById('signup-success').style.display='none';
        document.getElementById('signup-btn').style.display='';
        document.getElementById('signup-btn').disabled=false;
        document.getElementById('signup-btn').textContent='요청 보내기';
        document.getElementById('signup-id').value='';
        document.getElementById('signup-pw').value='';
        document.getElementById('signup-pw2').value='';
        document.getElementById('signup-error').textContent='';
    };

    /* ── 관리자 초기 설정 화면 ── */
    document.getElementById('setup-pw2').addEventListener('input', function() {
        var pw=document.getElementById('setup-pw').value, pw2=this.value;
        var hint=document.getElementById('setup-pw-hint');
        if (!pw2) { hint.textContent=''; return; }
        if (pw===pw2) { hint.textContent='✓ 일치'; hint.className='pw-hint ok'; }
        else          { hint.textContent='✗ 불일치'; hint.className='pw-hint ng'; }
    });
    document.getElementById('setup-btn').onclick = function() {
        var pw=document.getElementById('setup-pw').value;
        var pw2=document.getElementById('setup-pw2').value;
        var err=document.getElementById('setup-error');
        if (!pw||pw.length<4) { err.textContent='비밀번호는 4자 이상이어야 합니다.'; return; }
        if (pw!==pw2) { err.textContent='비밀번호가 일치하지 않습니다.'; return; }
        var btn=document.getElementById('setup-btn');
        btn.disabled=true; btn.textContent='생성 중...';
        saveAccount(ADMIN_ID, { id:ADMIN_ID, pw:simpleHash(pw), role:'admin', createdAt:new Date().toISOString() }, function(e) {
            if (e) { err.textContent='저장 실패: '+e.message; btn.disabled=false; btn.textContent='관리자 계정 생성'; return; }
            currentUser = { id:ADMIN_ID, role:'admin' };
            sessionStorage.setItem('planner_user', JSON.stringify(currentUser));
            hideAllScreens();
            enterApp();
        });
    };

    /* ── 로그아웃 ── */
    document.getElementById('logout-btn').onclick = function() {
        if (confirm('로그아웃 하시겠습니까?')) {
            sessionStorage.removeItem('planner_user');
            location.reload();
        }
    };

    /* ── 알림 버튼 ── */
    document.getElementById('notify-btn').onclick = function(e) {
        e.stopPropagation();
        var panel = document.getElementById('admin-panel');
        if (panel.classList.contains('visible')) {
            panel.classList.remove('visible');
        } else {
            renderRequestPanel();
            panel.classList.add('visible');
        }
    };
    document.getElementById('admin-panel-close').onclick = function() {
        document.getElementById('admin-panel').classList.remove('visible');
    };
    document.addEventListener('click', function(e) {
        var panel = document.getElementById('admin-panel');
        var btn   = document.getElementById('notify-btn');
        if (!panel.contains(e.target) && e.target !== btn) {
            panel.classList.remove('visible');
        }
    });

    /* ── 지출 날짜 추가 버튼 ── */
    document.getElementById('add-report-date-btn').onclick = function() {
        addReportDateRow('', '', 'monthly');
    };

    /* 회의 팝업 이벤트 */
    document.getElementById('meeting-close-btn').onclick  = closeMeetingPopup;
    document.getElementById('meeting-cancel-btn').onclick = closeMeetingPopup;
    document.getElementById('meeting-overlay').onclick    = closeMeetingPopup;
    document.getElementById('meeting-save-btn').onclick   = saveMeeting;
    document.getElementById('meeting-back-btn').onclick   = function() {
        if (meetingViewDate) showMeetingListView(meetingViewDate);
        else closeMeetingPopup();
    };
    document.getElementById('meeting-add-new-btn').onclick = function() { showMeetingFormView(-1); };
    document.getElementById('meeting-content').addEventListener('keydown', function(e){
        if (e.key === 'Enter' && e.ctrlKey) saveMeeting();
    });

    document.getElementById('add-expense-date-btn').onclick = function() {
        addExpenseDateRow('', '', 'monthly');
    };
    document.getElementById('add-report-date-btn').onclick = function() {
        addReportDateRow('', '', 'monthly');
    };

    /* 탭 전환 */
    document.querySelectorAll('.admin-tab').forEach(function(tab) {
        tab.onclick = function() {
            document.querySelectorAll('.admin-tab').forEach(function(t){ t.classList.remove('active'); });
            document.querySelectorAll('.admin-tab-pane').forEach(function(p){ p.classList.remove('active'); });
            this.classList.add('active');
            var pane = document.getElementById('tab-' + this.getAttribute('data-tab'));
            pane.classList.add('active');
            if (this.getAttribute('data-tab') === 'accounts') renderAccountList();
            if (this.getAttribute('data-tab') === 'requests') renderRequestPanel();
        };
    });

    /* ── 세션 복원 or 최초 진입 ── */
    var savedUser = sessionStorage.getItem('planner_user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        hideAllScreens();
        enterApp();
    } else {
        // 관리자 계정 존재 여부 확인
        getAccount(ADMIN_ID, function(err, acc) {
            if (acc) showScreen('login-screen');
            else     showScreen('setup-screen');
        });
    }

    /* ── 앱 진입 ── */
    function enterApp() {
        // 상단바 사용자 표시
        document.getElementById('user-label').textContent =
            (currentUser.role === 'admin' ? '👑 ' : '👤 ') + currentUser.id;

        // 관리자만 알림 버튼 표시
        document.getElementById('notify-btn').style.display =
            currentUser.id === ADMIN_ID ? 'inline-block' : 'none';

        // 관리자 주기적 알림 체크 (30초)
        if (currentUser.id === ADMIN_ID) {
            checkPendingRequests();
            notifyTimer = setInterval(checkPendingRequests, 30000);
        }

        loadData(function(saved) {
            if (saved) {
                activeDate = saved.activeDate || '';
                todos      = saved.todos      || {};
                wpData     = saved.wpData     || { routine:[], expense:[], report:[] };
                if (!wpData.meetings) wpData.meetings = [];
            }
            startApp();
        });
    }

    function startApp() {
        if (!calendar) {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView:'dayGridMonth', initialDate:'2026-03-18', locale:'ko', height:'100%',
                customButtons:{ meetingBtn:{ text:'📋 보고일정추가', click: function(){ openMeetingPopup(); } } },
                headerToolbar:{ left:'title', center:'', right:'meetingBtn today prev,next' },
                dayCellDidMount: function(arg) {
                    var topEl=arg.el.querySelector('.fc-daygrid-day-top');
                    var vBox=document.createElement('div'); vBox.className='v-box'; vBox.innerHTML=vIconSvg;
                    if(activeDate===arg.dateStr) vBox.classList.add('is-checked');
                    topEl.prepend(vBox);
    
                },
                datesSet: function(){ setTimeout(function(){ applyCellSquare(); applyHolidayColors(); renderAllCellTodos(); renderExpenseMarkers(); renderReportMarkers(); renderMeetingMarkers(); },50); },
                dateClick: function(info) {
                    document.querySelectorAll('.v-box').forEach(function(b){ b.classList.remove('is-checked'); });
                    if(activeDate===info.dateStr){
                        activeDate=''; saveAll(); MAX_VISIBLE=6; showRoutine(); refreshCalendar();
                    } else {
                        activeDate=info.dateStr; saveAll();
                        var vBox=info.dayEl.querySelector('.v-box'); if(vBox) vBox.classList.add('is-checked');
                        MAX_VISIBLE=5; showTodo(); refreshCalendar(); updateDisplay(info.dateStr,info.dayEl);
                    }
                }
            });
            calendar.render();
            window.addEventListener('resize', function(){ setTimeout(function(){ calendar.updateSize(); setTimeout(applyCellSquare,100); },50); });
            ['routine','expense','report'].forEach(function(key) {
                document.getElementById('plus-'+key).onclick    = function(){ openForm(key); };
                document.getElementById('fcancel-'+key).onclick = function(){ closeForm(key); };
                document.getElementById('fsave-'+key).onclick   = function(){ saveForm(key); };
                document.getElementById('fbody-'+key).addEventListener('keydown', function(e){ if(e.key==='Enter'&&e.ctrlKey) saveForm(key); });
            });
            document.getElementById('clear-all-btn').onclick = function() {
            var date = document.getElementById('selected-date-display').innerText;
            if (date === '날짜를 선택하세요' || !todos[date] || !todos[date].length) return;
            if (!confirm(date + ' 일정을 모두 삭제하시겠습니까?')) return;
            delete todos[date];
            saveAll();
            renderList(date);
            renderCellTodos(date);
            this.style.display = 'none';
        };

        document.getElementById('clear-all-btn').onclick = function() {
            var date = document.getElementById('selected-date-display').innerText;
            if (date === '날짜를 선택하세요' || !todos[date] || todos[date].length === 0) return;
            if (!confirm(date + '의 일정을 모두 삭제하시겠습니까?')) return;
            delete todos[date];
            saveAll();
            renderList(date);
            renderCellTodos(date);
        };

        document.getElementById('close-todo-btn').onclick = function() {
                document.querySelectorAll('.v-box').forEach(function(b){ b.classList.remove('is-checked'); });
                activeDate=''; saveAll(); MAX_VISIBLE=6;
                document.getElementById('selected-date-display').innerText='날짜를 선택하세요';
                document.getElementById('todo-list').innerHTML='';
                document.querySelectorAll('.fc-daygrid-day').forEach(function(d){ d.classList.remove('selected-day'); });
                showRoutine(); refreshCalendar();
            };
            document.getElementById('add-btn').onclick = addTodo;
            document.getElementById('todo-input').addEventListener('keydown', function(e){ if(e.key==='Enter') addTodo(); });
        }
        ['routine','expense','report'].forEach(function(k){ renderSection(k); });
        if (activeDate) { showTodo(); updateDisplay(activeDate); } else { showRoutine(); }
        refreshCalendar();

        function addTodo() {
            var input=document.getElementById('todo-input');
            var date=document.getElementById('selected-date-display').innerText;
            if(!input.value.trim()||date==='날짜를 선택하세요') return;
            if(!todos[date]) todos[date]=[];
            todos[date].push({text:input.value});
            saveAll(); renderList(date); renderCellTodos(date); input.value='';
        }
    }
});
</script>
</body>
</html>
