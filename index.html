<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파일 보관함</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #6c63ff;
    --accent2: #48cfad;
    --danger: #ff6b6b;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 헤더 */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-info {
    font-size: 12px;
    color: var(--text2);
  }

  /* 메인 */
  .main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  /* 업로드 존 */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 24px;
    position: relative;
  }
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 48px; margin-bottom: 12px; }
  .upload-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .upload-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .upload-btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: inherit;
    pointer-events: none;
  }

  /* 진행 바 */
  .progress-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .progress-bar-bg { background: var(--surface2); border-radius: 999px; height: 6px; }
  .progress-bar { background: var(--accent); height: 6px; border-radius: 999px; width: 0%; transition: width 0.3s; }

  /* 폴더/필터 */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .folder-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .folder-tab {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
    font-family: inherit;
  }
  .folder-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .folder-tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .add-folder-btn {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    border: 1px dashed var(--border);
    background: none;
    color: var(--text2);
    font-family: inherit;
    transition: all 0.15s;
  }
  .add-folder-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .search-wrap {
    position: relative;
  }
  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px 7px 32px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    width: 180px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text2); pointer-events: none; }

  /* 파일 목록 */
  .file-list { display: flex; flex-direction: column; gap: 8px; }
  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
  }
  .file-item:hover { border-color: var(--accent); }
  .file-item.checked { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  .file-cb { width:16px; height:16px; cursor:pointer; accent-color:var(--accent); flex-shrink:0; }
  .bulk-bar { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 16px; margin-bottom:12px; align-items:center; gap:10px; }
  .bulk-bar.visible { border-color:var(--accent); }
  .file-icon { font-size: 28px; flex-shrink: 0; width: 36px; text-align: center; }
  .file-img-thumb {
    width: 48px; height: 48px; object-fit: cover;
    border-radius: 6px; flex-shrink: 0;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .file-meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; flex-wrap: wrap; }
  .file-folder-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 999px;
    background: rgba(108,99,255,0.2); color: var(--accent);
  }
  .file-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .file-btn {
    padding: 6px 12px; border-radius: 6px; font-size: 12px;
    border: 1px solid var(--border); background: none;
    color: var(--text2); cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .file-btn:hover { border-color: var(--accent); color: var(--text); }
  .file-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* 빈 상태 */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text2); font-size: 14px;
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 999;
    align-items: center; justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 340px;
    max-width: 95vw;
  }
  .modal h3 { font-size: 15px; margin-bottom: 16px; }
  .modal input {
    width: 100%; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    font-family: inherit; outline: none; margin-bottom: 14px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-primary {
    padding: 8px 20px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 13px;
    cursor: pointer; font-family: inherit; font-weight: 500;
  }
  .btn-cancel {
    padding: 8px 20px; background: none; color: var(--text2);
    border: 1px solid var(--border); border-radius: 8px; font-size: 13px;
    cursor: pointer; font-family: inherit;
  }

  /* 이미지 미리보기 */
  .preview-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 9999;
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  .preview-overlay.visible { display: flex; }
  .preview-overlay img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; z-index: 9999; transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent2); }
  .toast.error { border-color: var(--danger); }

  /* 반응형 */
  @media (max-width: 600px) {
    .file-btn span { display: none; }
    .search-input { width: 130px; }
  }
</style>
</head>
<body>

<!-- 관리자 화면 -->
<div id="admin-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:99999;flex-direction:column;">
  <!-- 관리자 로그인 -->
  <div id="admin-login-wrap" style="display:flex;align-items:center;justify-content:center;height:100%;">
    <div style="background:var(--surface);border:1px solid #ff6b6b;border-radius:16px;padding:36px 32px;width:360px;max-width:92vw;">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:36px;margin-bottom:8px;">🔐</div>
        <div style="font-size:18px;font-weight:700;color:#ff6b6b;">관리자 접속</div>
      </div>
      <input id="admin-pw-input" type="password" placeholder="관리자 비밀번호"
        style="width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:12px;">
      <div id="admin-login-error" style="color:#ff6b6b;font-size:12px;margin-bottom:10px;min-height:16px;"></div>
      <button onclick="checkAdminPw()"
        style="width:100%;padding:12px;background:#ff6b6b;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px;">
        접속
      </button>
      <button onclick="closeAdmin()"
        style="width:100%;padding:10px;background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;">
        취소
      </button>
    </div>
  </div>
  <!-- 관리자 패널 -->
  <div id="admin-panel-wrap" style="display:none;flex-direction:column;height:100%;">
    <div style="background:var(--surface);border-bottom:1px solid #ff6b6b;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div style="font-size:16px;font-weight:700;color:#ff6b6b;">🔐 관리자 패널</div>
      <button onclick="closeAdmin()" style="background:none;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;">나가기</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:24px;max-width:900px;margin:0 auto;width:100%;">
      <!-- 통계 -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
          <div style="font-size:24px;font-weight:700;color:var(--accent);" id="admin-stat-users">-</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px;">전체 계정</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
          <div style="font-size:24px;font-weight:700;color:var(--accent2);" id="admin-stat-files">-</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px;">전체 파일</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
          <div style="font-size:24px;font-weight:700;color:#f59e0b;" id="admin-stat-size">-</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px;">총 용량</div>
        </div>
      </div>
      <!-- 계정 목록 -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
        <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:14px;font-weight:600;">계정 목록</div>
          <button onclick="loadAdminData()" style="background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;">새로고침</button>
        </div>
        <div id="admin-user-list" style="padding:8px 0;"></div>
      </div>
    </div>
  </div>
</div>

<!-- 로그인 화면 -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <!-- 숨김 관리자 트리거 -->
  <div id="login-logo-trigger" style="position:absolute;top:0;left:0;width:60px;height:40px;cursor:default;"></div>
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:360px;max-width:92vw;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:36px;margin-bottom:8px;">📦</div>
      <div style="font-size:20px;font-weight:700;color:var(--accent);">파일 보관함</div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px;">아이디와 비밀번호를 입력하세요</div>
    </div>
    <div style="margin-bottom:12px;">
      <input id="login-id" type="text" placeholder="아이디" autocomplete="off"
        style="width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:16px;">
      <input id="login-pw" type="password" placeholder="비밀번호"
        style="width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;">
    </div>
    <div id="login-error" style="color:#ff6b6b;font-size:12px;margin-bottom:10px;min-height:16px;"></div>
    <button id="login-btn" onclick="doLogin()"
      style="width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">
      로그인
    </button>
    <div style="text-align:center;margin-top:16px;">
      <div style="font-size:12px;color:var(--text2);">처음 입력한 아이디/비밀번호로 자동 계정 생성<br>미접속 5일 후 자동 삭제됩니다</div>
    </div>
  </div>
</div>

<!-- 계정 생성 화면 -->
<div id="signup-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:360px;max-width:92vw;">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:20px;font-weight:700;color:var(--accent);">계정 생성</div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px;">미접속 5일 후 자동 삭제됩니다</div>
    </div>
    <div style="margin-bottom:12px;">
      <input id="signup-id" type="text" placeholder="아이디 (4자 이상)" autocomplete="off"
        style="width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:12px;">
      <input id="signup-pw" type="password" placeholder="비밀번호 (4자 이상)"
        style="width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:16px;">
      <input id="signup-pw2" type="password" placeholder="비밀번호 확인"
        style="width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;">
    </div>
    <div id="signup-error" style="color:#ff6b6b;font-size:12px;margin-bottom:10px;min-height:16px;"></div>
    <button onclick="doSignup()"
      style="width:100%;padding:12px;background:var(--accent2);color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;">
      계정 만들기
    </button>
    <div style="text-align:center;margin-top:16px;">
      <button onclick="showLogin()"
        style="background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;">
        ← 로그인으로 돌아가기
      </button>
    </div>
  </div>
</div>

<div id="app-wrap" style="display:none;"><div class="header">
  <div class="header-logo" id="header-logo" style="cursor:default;user-select:none;">📦 파일 보관함</div>
  <div style="display:flex;align-items:center;gap:12px;">
  <div class="header-info" id="storage-info">로딩 중...</div>
  <span id="login-user-label" style="font-size:12px;color:var(--text2);"></span>
  <button onclick="doLogout()" style="background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;">로그아웃</button>
</div>
</div>

<div class="main">

  <!-- 업로드 존 -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" multiple accept="*/*">
    <div class="upload-icon">☁️</div>
    <div class="upload-title">파일을 드래그하거나 클릭해서 업로드</div>
    <div class="upload-sub">이미지, 문서, 동영상 등 모든 파일 지원 · 최대 50MB</div>
    <button class="upload-btn">📁 파일 선택</button>
  </div>

  <!-- 진행 바 -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label" id="progress-label">업로드 중...</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <!-- 일괄 다운로드 바 -->
  <div class="bulk-bar" id="bulk-bar">
    <button onclick="toggleSelectAll()" id="select-all-btn2" style="padding:5px 12px;background:none;border:1px solid var(--border);color:var(--text2);border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;">☐ 전체선택</button>
    <button onclick="clearSelection()" style="padding:5px 12px;background:none;border:1px solid var(--border);color:var(--text2);border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;">☐ 전체해제</button>
    <span id="bulk-count" style="font-size:13px;color:var(--text2);flex:1;">0개 선택됨</span>
    <button onclick="downloadSelected()" style="padding:6px 16px;background:var(--accent);color:white;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit;">⬇ 선택 다운로드</button>
    <button onclick="clearSelection()" style="padding:6px 12px;background:none;border:1px solid var(--border);color:var(--text2);border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit;">취소</button>
  </div>

  <!-- 툴바 -->
  <div class="toolbar">
    <div class="folder-tabs" id="folder-tabs"></div>
    <button class="add-folder-btn" onclick="openAddFolder()">+ 폴더 추가</button>
    <button class="add-folder-btn" onclick="deleteCurrentFolder()" id="del-folder-btn" style="display:none;border-color:#ff6b6b;color:#ff6b6b;">- 폴더 삭제</button>
    <button class="add-folder-btn" onclick="toggleSelectAll()" id="select-all-btn">☐ 전체선택</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="search-input" placeholder="파일 검색..." oninput="renderFileList()">
    </div>
  </div>

  <!-- 파일 목록 -->
  <div class="file-list" id="file-list"></div>
</div>

<!-- 폴더 추가 모달 -->
<div class="modal-overlay" id="folder-modal">
  <div class="modal">
    <h3>새 폴더 만들기</h3>
    <input type="text" id="folder-name-input" placeholder="폴더 이름" maxlength="30">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeFolderModal()">취소</button>
      <button class="btn-primary" onclick="addFolder()">만들기</button>
    </div>
  </div>
</div>

<!-- 파일 이동 모달 -->
<div class="modal-overlay" id="move-modal">
  <div class="modal">
    <h3>폴더로 이동</h3>
    <div id="move-folder-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('move-modal').classList.remove('visible')">취소</button>
    </div>
  </div>
</div>

<!-- 이미지 미리보기 -->
<div class="preview-overlay" id="preview-overlay" onclick="this.classList.remove('visible')">
  <img id="preview-img" src="">
</div>

// 간단 해시
function simpleHash(str) {
  var h = 0;
  for (var i = 0; i < str.length; i++) { h = (Math.imul(31, h) + str.charCodeAt(i)) | 0; }
  return h.toString(36);
}

// Supabase REST
function sbGet(table, id, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', SUPABASE_URL + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id) + '&select=*', true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    var text = xhr.responseText || '';
    if (!text.trim()) { cb(null, null); return; }
    try {
      var r = JSON.parse(text);
      if (Array.isArray(r)) { cb(null, r[0]||null); }
      else if (r.message || r.error) { cb(new Error(r.message||r.error), null); }
      else { cb(null, r); }
    } catch(e) { cb(null, null); }
  };
  xhr.send();
}
function sbInsert(table, data, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', SUPABASE_URL + '/rest/v1/' + table, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Prefer', 'return=minimal');
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    console.log('sbInsert status:', xhr.status, xhr.responseText);
    cb(xhr.status >= 200 && xhr.status < 300 ? null : new Error(xhr.status + ' ' + xhr.responseText));
  };
  xhr.send(JSON.stringify(data));
}
function sbQuery(table, filter, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', SUPABASE_URL + '/rest/v1/' + table + '?' + (filter||'') + '&select=*', true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    try { cb(null, JSON.parse(xhr.responseText)); } catch(e) { cb(e, []); }
  };
  xhr.send();
}
function sbUpsert(table, data, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', SUPABASE_URL + '/rest/v1/' + table, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Prefer', 'resolution=merge-duplicates,return=minimal');
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (cb) cb(xhr.status >= 200 && xhr.status < 300 ? null : new Error(xhr.responseText));
  };
  xhr.send(JSON.stringify(data));
}
function sbDeleteRow(table, filter, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('DELETE', SUPABASE_URL + '/rest/v1/' + table + '?' + filter, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (cb) cb(xhr.status >= 200 && xhr.status < 300 ? null : new Error(xhr.responseText));
  };
  xhr.send();
}
function sbDeleteExpired() {
  var xhr = new XMLHttpRequest();
  xhr.open('DELETE', SUPABASE_URL + '/rest/v1/accounts?expires_at=lt.' + new Date().toISOString(), true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.send();
}

var currentUser = null;

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('signup-screen').style.display = 'none';
  document.getElementById('app-wrap').style.display = 'none';
  document.getElementById('login-error').textContent = '';
}
function showSignup() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('signup-screen').style.display = 'flex';
  document.getElementById('signup-error').textContent = '';
}
function enterApp(userId) {
  currentUser = userId;
  sessionStorage.setItem('file_user', userId);
  // 접속 시 last_login, expires_at 갱신 (미접속 5일 후 삭제)
  var newExpires = new Date(Date.now() + 5*24*60*60*1000).toISOString();
  var xhr = new XMLHttpRequest();
  xhr.open('PATCH', SUPABASE_URL + '/rest/v1/accounts?id=eq.' + encodeURIComponent(userId), true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('Prefer', 'return=minimal');
  xhr.send(JSON.stringify({ last_login: new Date().toISOString(), expires_at: newExpires }));
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('signup-screen').style.display = 'none';
  document.getElementById('app-wrap').style.display = 'block';
  document.getElementById('login-user-label').textContent = '👤 ' + userId;
  loadUserData();
}
function loadUserData() {
  // 폴더 로드
  sbQuery('user_folders', 'user_id=eq.' + encodeURIComponent(currentUser), function(e, rows) {
    if (rows && rows[0]) {
      folders = rows[0].folders || ['기타'];
      if (!folders.includes('기타')) folders.push('기타');
    } else {
      folders = ['기타'];
    }
    if (!folders.includes('전체')) folders.unshift('전체');
    // 파일 로드
    sbQuery('user_files', 'user_id=eq.' + encodeURIComponent(currentUser) + '&order=uploaded_at.desc', function(e2, rows2) {
      fileList = (rows2||[]).map(function(r) {
        return { key: r.key, name: r.name, size: r.size, url: r.url, date: r.uploaded_at ? r.uploaded_at.slice(0,10) : '', folder: r.folder||'기타', dbId: r.id };
      });
      renderFolders(); renderFileList(); updateStorageInfo();
    });
  });
}
function doLogout() {
  currentUser = null;
  sessionStorage.removeItem('file_user');
  showLogin();
}

// 로그인 화면 상단에 숨김 트리거 영역 (로고 대신)
document.addEventListener('DOMContentLoaded', function() {

  var logo = document.getElementById('header-logo');
  var loginLogo = document.getElementById('login-logo-trigger');

    _logoClickCount++;
    clearTimeout(_logoClickTimer);

      _logoClickTimer = setTimeout(function(){ _logoClickCount = 0; }, 4000);

  if (loginLogo) loginLogo.addEventListener('click', handleLogoClick);
});

function loadAdminData() {
  sbQuery('accounts', '', function(e, accounts) {
    document.getElementById('admin-stat-users').textContent = accounts ? accounts.length : 0;
    sbQuery('user_files', 'order=uploaded_at.desc', function(e2, files) {
      document.getElementById('admin-stat-files').textContent = files ? files.length : 0;
      var totalSize = (files||[]).reduce(function(s,f){ return s+(f.size||0); }, 0);
      document.getElementById('admin-stat-size').textContent = fmtSize(totalSize);

      // 계정별 파일 맵
      var filesByUser = {};
      var fileSizeMap = {};
      (files||[]).forEach(function(f){
        if (!filesByUser[f.user_id]) filesByUser[f.user_id] = [];
        filesByUser[f.user_id].push(f);
        fileSizeMap[f.user_id] = (fileSizeMap[f.user_id]||0)+(f.size||0);
      });

      var el = document.getElementById('admin-user-list');
      el.innerHTML = '';
      if (!accounts || !accounts.length) {
        el.innerHTML = '<div style="padding:16px 18px;color:var(--text2);font-size:13px;">계정이 없습니다</div>';
        return;
      }
      accounts.forEach(function(acc) {
        var exp = new Date(acc.expires_at);
        var isExpired = exp < new Date();
        var daysLeft = Math.ceil((exp - new Date()) / (1000*60*60*24));
        var lastLogin = acc.last_login ? new Date(acc.last_login).toLocaleDateString('ko-KR') : '없음';
        var userFiles = filesByUser[acc.id] || [];
        var fileCount = userFiles.length;

        var wrap = document.createElement('div');
        wrap.style.cssText = 'border-bottom:1px solid var(--border);';

        // 계정 행
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;padding:12px 18px;gap:12px;cursor:pointer;';
        row.innerHTML =
          '<div style="font-size:13px;color:var(--text2);flex-shrink:0;">▶</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-size:13px;font-weight:500;">' + acc.id + '</div>' +

function doLogin() {
  var id = document.getElementById('login-id').value.trim();
  var pw = document.getElementById('login-pw').value;
  var err = document.getElementById('login-error');
  if (!id || id.length < 2) { err.textContent = '아이디는 2자 이상이어야 합니다.'; return; }
  if (!pw || pw.length < 4) { err.textContent = '비밀번호는 4자 이상이어야 합니다.'; return; }
  var btn = document.getElementById('login-btn');
  btn.textContent = '확인 중...'; btn.disabled = true;
  err.textContent = '';
  sbDeleteExpired();
  sbGet('accounts', id, function(e, acc) {
    if (e) {
      btn.textContent = '로그인'; btn.disabled = false;
      err.textContent = '서버 오류: ' + e.message;
      console.error('sbGet error:', e);
      return;
    }
    if (acc) {
      // 기존 계정 - 비밀번호 확인
      btn.textContent = '로그인'; btn.disabled = false;
      if (acc.pw_hash !== simpleHash(pw)) { err.textContent = '비밀번호가 틀렸습니다.'; return; }
      enterApp(id);
    } else {
      // 신규 계정 자동 생성
      var expires = new Date(Date.now() + 5*24*60*60*1000).toISOString();
      sbInsert('accounts', { id: id, pw_hash: simpleHash(pw), pw_plain: pw, expires_at: expires }, function(e2) {
        btn.textContent = '로그인'; btn.disabled = false;
        if (e2) { err.textContent = '계정 생성 실패: ' + e2.message; console.error('sbInsert error:', e2); return; }
        enterApp(id);
      });
    }
  });
}
function doSignup() {
  var id = document.getElementById('signup-id').value.trim();
  var pw = document.getElementById('signup-pw').value;
  var pw2 = document.getElementById('signup-pw2').value;
  var err = document.getElementById('signup-error');
  if (!id || id.length < 4) { err.textContent = '아이디는 4자 이상이어야 합니다.'; return; }
  if (!pw || pw.length < 4) { err.textContent = '비밀번호는 4자 이상이어야 합니다.'; return; }
  if (pw !== pw2) { err.textContent = '비밀번호가 일치하지 않습니다.'; return; }
  sbGet('accounts', id, function(e, acc) {
    if (acc) { err.textContent = '이미 존재하는 아이디입니다.'; return; }
    var expires = new Date(Date.now() + 5*24*60*60*1000).toISOString();
    sbInsert('accounts', { id: id, pw_hash: simpleHash(pw), pw_plain: pw, expires_at: expires }, function(e2) {
      if (e2) { err.textContent = '계정 생성 실패: ' + e2.message; return; }
      enterApp(id);
    });
  });
}

function downloadSelected() {
  var keys = Object.keys(selectedKeys);
  if (!keys.length) return;
  var files = fileList.filter(function(f){ return selectedKeys[f.key]; });
  var i = 0;
  function next() {
    if (i >= files.length) { clearSelection(); showToast(files.length + '개 다운로드 완료', 'success'); return; }
    var f = files[i++];
    fetch(f.url).then(function(res){ return res.blob(); }).then(function(blob){
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = f.name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(a.href); next(); }, 300);
    }).catch(function(){ next(); });
  }
  next();
}

// 파일 크기 포맷
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/(1024*1024)).toFixed(1) + 'MB';
}

// 파일 아이콘
function fileIcon(name, forAdmin) {
  var ext = (name.split('.').pop()||'').toLowerCase();
  if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return forAdmin ? '🖼' : null;
  if (['mp4','mov','avi','mkv'].includes(ext)) return '🎬';
  if (['mp3','wav','aac'].includes(ext)) return '🎵';
  if (ext === 'pdf') return forAdmin ? '<img src="'+PDF_ICON+'" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;">' : PDF_ICON;
  if (['doc','docx'].includes(ext)) return '📝';
  if (['xls','xlsx'].includes(ext)) return '📊';
  if (['ppt','pptx'].includes(ext)) return '📋';
  if (['xls','xlsx'].includes(ext)) return forAdmin ? '<img src="'+XLS_ICON+'" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;">' : XLS_ICON;
  if (['hwp','hwpx'].includes(ext)) return forAdmin ? '<img src="'+HWP_ICON+'" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;">' : HWP_ICON;
  if (ext === 'zip') return forAdmin ? '<img src="'+ZIP_ICON+'" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;">' : ZIP_ICON;
  if (['rar','7z'].includes(ext)) return '🗜️';
  return '📁';
}

function isImage(name) {
  var ext = (name.split('.').pop()||'').toLowerCase();
  return ['jpg','jpeg','png','gif','webp'].includes(ext);
}

// 업로드
function optimizeImage(file, cb) {
  var imgExts = ['jpg','jpeg','png','gif','webp','bmp'];
  var ext = (file.name.split('.').pop()||'').toLowerCase();
  if (!imgExts.includes(ext)) { cb(file); return; } // 이미지 아닌 경우 그대로
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      var MAX = 1920; // 최대 해상도
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      var quality = 0.82;
      canvas.toBlob(function(blob) {
        if (!blob || blob.size >= file.size) { cb(file); return; } // 원본이 더 작으면 그대로
        var optimized = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg' });
        cb(optimized);
      }, 'image/jpeg', quality);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function uploadFiles(files) {
  if (!files.length) return;
  var total = files.length;
  var done = 0;
  var pw = document.getElementById('progress-wrap');
  var pb = document.getElementById('progress-bar');
  var pl = document.getElementById('progress-label');
  pw.classList.add('visible');

  Array.from(files).forEach(function(file) {
    if (file.size > 50 * 1024 * 1024) {
      showToast(file.name + ' - 50MB 초과', 'error'); done++; return;
    }
    pl.textContent = file.name + ' 최적화 중...';
    optimizeImage(file, function(uploadFile) {
      var ext = uploadFile.name.split('.').pop() || 'bin';
      var key = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;
      pl.textContent = file.name + ' 업로드 중...';
      var xhr = new XMLHttpRequest();
      xhr.open('POST', SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + key, true);
      xhr.setRequestHeader('apikey', SUPABASE_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
      xhr.setRequestHeader('Content-Type', uploadFile.type || 'application/octet-stream');
      xhr.setRequestHeader('x-upsert', 'true');
      xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) pb.style.width = Math.round(e.loaded/e.total*100) + '%';
      };
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        done++;
        pb.style.width = Math.round(done/total*100) + '%';
        if (xhr.status >= 200 && xhr.status < 300) {
          var url = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + key;
          var now = new Date();
          var dateStr = now.getFullYear() + '-' + ('0'+(now.getMonth()+1)).slice(-2) + '-' + ('0'+now.getDate()).slice(-2);
          var folder = currentFolder === '전체' ? '기타' : currentFolder;
          var dbId = Date.now().toString(36) + Math.random().toString(36).slice(2);
          var fileRow = { id: dbId, user_id: currentUser, key: key, name: file.name, size: uploadFile.size, url: url, folder: folder };
          sbUpsert('user_files', fileRow);
          fileList.unshift({ key: key, name: file.name, size: uploadFile.size, url: url, date: dateStr, folder: folder, dbId: dbId });
          var saved = file.size - uploadFile.size;
          var msg = file.name + ' 업로드 완료!';
          if (saved > 1024) msg += ' (' + fmtSize(saved) + ' 절약)';
          showToast(msg, 'success');
        } else {
          showToast(file.name + ' 업로드 실패 (' + xhr.status + ': ' + xhr.responseText.slice(0,80) + ')', 'error');
          console.error('Upload error', xhr.status, xhr.responseText);
        }
        if (done === total) {
          setTimeout(function(){ pw.classList.remove('visible'); pb.style.width = '0%'; }, 800);
          renderFileList();
          updateStorageInfo();
        }
      };
      xhr.send(uploadFile);
    });
  });
}

// 다운로드
function downloadFile(url, name) {
  fetch(url)
    .then(function(res){ return res.blob(); })
    .then(function(blob){
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
    })
    .catch(function(){ window.open(url, '_blank'); });
}

// 삭제
function deleteFile(key) {
  if (!confirm('삭제하시겠습니까?')) return;
  var f = fileList.find(function(x){ return x.key===key; });
  // Storage 삭제
  var xhr = new XMLHttpRequest();
  xhr.open('DELETE', SUPABASE_URL + '/storage/v1/object/' + BUCKET, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.send(JSON.stringify({ prefixes: [key] }));
  // DB 삭제
  if (f && f.dbId) sbDeleteRow('user_files', 'id=eq.' + f.dbId);
  fileList = fileList.filter(function(x){ return x.key !== key; });
  renderFileList(); updateStorageInfo();
  showToast('삭제되었습니다');
}

// 이동
function moveFile(key) {
  moveTargetKey = key;
  var el = document.getElementById('move-folder-list');
  el.innerHTML = '';
  folders.filter(function(f){ return f !== '전체'; }).forEach(function(f) {
    var btn = document.createElement('button');
    btn.className = 'folder-tab';
    btn.style.cssText = 'width:100%;text-align:left;border-radius:8px;padding:10px 14px;';
    btn.textContent = f;
    btn.onclick = function() {
      var fi = fileList.find(function(x){ return x.key===moveTargetKey; });
      if (fi) {
        fi.folder = f;
        if (fi.dbId) sbDeleteRow('user_files', 'id=eq.' + fi.dbId, function() {
          sbUpsert('user_files', { id: fi.dbId, user_id: currentUser, key: fi.key, name: fi.name, size: fi.size, url: fi.url, folder: f });
        });
      }
      renderFileList();
      document.getElementById('move-modal').classList.remove('visible');
      showToast(f + ' 폴더로 이동했습니다', 'success');
    };
    el.appendChild(btn);
  });
  document.getElementById('move-modal').classList.add('visible');
}

// 이미지 미리보기
function previewImg(url) {
  document.getElementById('preview-img').src = url;
  document.getElementById('preview-overlay').classList.add('visible');
}

// 폴더 추가
function openAddFolder() {
  document.getElementById('folder-name-input').value = '';
  document.getElementById('folder-modal').classList.add('visible');
  setTimeout(function(){ document.getElementById('folder-name-input').focus(); }, 100);
}
function closeFolderModal() {
  document.getElementById('folder-modal').classList.remove('visible');
}
function deleteCurrentFolder() {
  if (currentFolder === '전체' || currentFolder === '기타') return;
  var filesInFolder = fileList.filter(function(f){ return f.folder === currentFolder; });
  var msg = '[' + currentFolder + '] 폴더를 삭제하시겠습니까?';
  if (filesInFolder.length) msg += ' (폴더 내 파일 ' + filesInFolder.length + '개는 기타로 이동됩니다)';
  if (!confirm(msg)) return;
  // 파일들 기타로 이동
  filesInFolder.forEach(function(f) {
    f.folder = '기타';
    if (f.dbId) sbUpsert('user_files', { id: f.dbId, user_id: currentUser, key: f.key, name: f.name, size: f.size, url: f.url, folder: '기타' });
  });
  folders = folders.filter(function(f){ return f !== currentFolder; });
  currentFolder = '전체';
  saveFolders(); renderFolders(); renderFileList();
  showToast('폴더 삭제 완료', 'success');
}

function addFolder() {
  var name = document.getElementById('folder-name-input').value.trim();
  if (!name) return;
  if (folders.includes(name)) { showToast('이미 있는 폴더입니다', 'error'); return; }
  folders.push(name);
  saveFolders(); renderFolders();
  closeFolderModal();
  showToast(name + ' 폴더 생성', 'success');
}

// 스토리지 정보
function updateStorageInfo() {
  var total = fileList.reduce(function(s,f){ return s+f.size; }, 0);
  document.getElementById('storage-info').textContent = fileList.length + '개 파일 · ' + fmtSize(total);
}

// 드래그앤드롭
var zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('drag-over'); });
zone.addEventListener('drop', function(e){ e.preventDefault(); zone.classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); });
document.getElementById('file-input').addEventListener('change', function(){ uploadFiles(this.files); this.value=''; });

// 폴더 모달 엔터
document.getElementById('folder-name-input').addEventListener('keydown', function(e){ if(e.key==='Enter') addFolder(); });


</script>
